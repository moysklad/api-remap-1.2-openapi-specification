image: $GLOBAL_DOCKER_URL/maven:3.4-release

workflow:
  name: '$PROJECT1_PIPELINE_NAME'
  rules:
    - if: '$BRANCH != "release" && $CI_PIPELINE_SOURCE == "web"'
      variables:
        PROJECT1_PIPELINE_NAME: 'Feature $BRANCH pipeline'
    - if: '$BRANCH == "release" && $CI_PIPELINE_SOURCE == "web"'
      variables:
        PROJECT1_PIPELINE_NAME: 'Release pipeline'

include:
  - local: gitlab/common/verify.gitlab-ci.yml

variables:
  MAVEN_CLI_OPTS: "--batch-mode"

build-for-tests:
  stage: build
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - git clone https://github.com/moysklad/java-remap-sdk-1.2.git
    - cd java-remap-sdk-1.2
    - export TZ='Europe/Moscow'
  script:
    - if [ -z "$BRANCH" ]; then
      BRANCH='master';
      fi
    - git checkout $BRANCH;
    - ARTEFACT_VERSION="${BRANCH}-${CI_PIPELINE_ID}"
    - mvn versions:set -DnewVersion=$ARTEFACT_VERSION -DgenerateBackupPoms=false;
    - mvn $MAVEN_CLI_OPTS -Ppublishing-artifactory clean deploy -DartifactoryRepo=${ARTIFACTORY_REPO_URL};
    - echo "Complete. Version $ARTEFACT_VERSION"
  only:
    variables:
      - $auto != "yes"
      - $BRANCH != "release"

deploy-to-maven:
  stage: build
  rules:
    - if: '$BRANCH == "release"'
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - echo "$GPG_SECRET_KEY" | gpg --import
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - git clone https://github.com/moysklad/java-remap-sdk-1.2.git
    - cd java-remap-sdk-1.2
    - export TZ='Europe/Moscow'
  script:
    - |
      echo "Adding the ossrh server inside <servers> section"
        sed -i '/<servers>/a \
        <server>\
          <id>central</id>\
          <username>${CENTRAL_USER}</username>\
          <password>${CENTRAL_PASSWORD}</password>\
        </server>' ~/.m2/settings.xml

    - git checkout master
    - git config user.name "$GIT_USER"
    - git config user.email "$GIT_MAIL"
    - mvn $MAVEN_CLI_OPTS -Dusername=$GIT_USER -Dpassword=$GIT_PASSWORD -Ppublishing-central release:prepare
    - mvn -Ppublishing-central release:perform


deploy-job:
  image: $GLOBAL_DOCKER_URL/maven:7.8-release
  stage: deploy-for-space
  variables:
    PARAM_PROFILE: "remap12_minimal_ru"
    PARAM_REF: $CI_COMMIT_REF_NAME
    #    PARAM_VERSION: VERSION_PIPE #версия окружения ремапа#
    GITLAB_TEST_TYPE: e2e
    GITLAB_TEST_TYPE_VARIANT: api
  before_script:
    - python3 env_prepare.py $PARAM_REF $CI_PIPELINE_ID $CI_JOB_ID $PARAM_VERSION $PARAM_PROFILE
  script:
    - export NAMESPACE=$(cat namespace-export-file)
    - export HTTP_API='https://api'
    - export DMS_API_ENDPOINT='testms-test.lognex.ru'
    - export API_HOST=$HTTP_API-$NAMESPACE.$DMS_API_ENDPOINT
    - echo "API_HOST=${API_HOST}" >> variable.env
    - echo "NAMESPACE=${NAMESPACE}" >> variable.env
  artifacts:
    reports:
      dotenv: variable.env


test-create-user:
  dependencies:
    - deploy-job
  image: alpine:latest
  stage: create-user
  script:
    - apk add --no-cache curl jq
    - |
      RESPONSE=$(curl --location -X POST $API_HOST/api/remap/1.2/register \
      --header 'Content-Type: application/x-www-form-urlencoded' \
      --header 'Accept-Encoding: gzip' \
      --data-urlencode 'email=megorov@moysklad.ru')

    - echo $RESPONSE
    - API_PASSWORD=$(echo "$RESPONSE" | sed -n 's/.*"password"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
    - echo "$API_PASSWORD"
    - echo API_PASSWORD=$API_PASSWORD >> user.env
    - API_LOGIN=$(echo "$RESPONSE" | sed -n 's/.*"uid"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
    - echo "$API_LOGIN"
    - echo API_LOGIN=$API_LOGIN >> user.env
  artifacts:
    reports:
      dotenv: user.env
  only:
    variables:
      - $auto == "yes"

test-sdk:
  dependencies:
    - deploy-job
    - test-create-user
  image: $GLOBAL_DOCKER_URL/maven:3.4-release
  stage: build
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - echo "$GPG_SECRET_KEY" | gpg --import
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - git clone $CI_REPOSITORY_URL
  script:
    - git clone https://github.com/moysklad/java-remap-sdk-1.2.git
    - cd java-remap-sdk-1.2
    - if [ -z "$BRANCH" ]; then
      BRANCH='master';
      fi
    - git checkout $BRANCH;
    - export ARTEFACT_VERSION="$BRANCH-${CI_PIPELINE_ID}"
    - mvn versions:set -DnewVersion=$ARTEFACT_VERSION -DgenerateBackupPoms=false;
    - mvn $MAVEN_CLI_OPTS -Ppublishing-artifactory clean deploy -DartifactoryRepo=${ARTIFACTORY_REPO_URL};
    - echo "Complete. Version $ARTEFACT_VERSION"
  only:
    variables:
      - $sdk == "java"

remove-space:
  image: $GLOBAL_DOCKER_URL/maven:7.8-release
  dependencies:
    - deploy-job
    - test-sdk
  stage: delete-space
  script:
    - python3 env_clean.py $NAMESPACE $CI_PIPELINE_ID $CI_JOB_ID
  when: manual