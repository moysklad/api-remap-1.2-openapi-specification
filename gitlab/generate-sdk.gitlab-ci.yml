generate-php-sdk:
  extends: .common-generate-php-sdk
  rules:
    - if: '$CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "release"'
  script:
    - npm install
    - npm run validate || echo "Validation failed, but continuing..."
    - npm run generate-php
    - |
      if [ ! -d "clients/php" ]; then
        echo "Directory clients/php not found. Nothing to sync."
        exit 0
      fi

    - git clone \
      --depth=1 \
      --single-branch \
      --branch master \
      "https://x-access-token:${SDK_PHP_REPO_TOKEN}@github.com/${SDK_REPO}.git" \
      sdk-repo
    - cd sdk-repo
    - git remote set-url origin "https://x-access-token:${SDK_PHP_REPO_TOKEN}@github.com/${SDK_REPO}.git"
    - git checkout -B "$SDK_BRANCH"
    - rsync -a --delete ../clients/php/ ./

    - git add -A
    - |
      if git diff --staged --quiet; then
        echo "No changes to commit in SDK repository. Skipping push & PR."
        exit 0
      fi
    - git commit -m "Auto-generated PHP SDK from OpenAPI specification"
    - git push -u origin "$SDK_BRANCH"
  artifacts:
    paths:
      - clients/php/
    expire_in: 1 hour
