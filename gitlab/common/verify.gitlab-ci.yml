check-env:
  stage: verify
  script:
    - |
      set -euo pipefail
      
      echo "🔍 Проверка переменных окружения..."
      env_missing=0
      
      for var in API_HOST API_LOGIN API_PASSWORD; do
        value="$(printenv "$var" || true)"
        if [ -z "$value" ]; then
          echo "❌ ОШИБКА: Не задана обязательная переменная $var"
          env_missing=1
        else
          echo "✅ $var - OK"
        fi
      done
      
      if [ $env_missing -eq 1 ]; then
        exit 1
      fi
