# Базовый шаблон для Prism smoke тестов (для языков с отдельным Prism-сервисом)
.sdk-prism-base:
  stage: test
  services:
    - name: stoplight/prism:4
      alias: prism
      command: ["mock", "-h", "0.0.0.0", "/builds/$CI_PROJECT_PATH/dist/openapi.yaml"]
  variables:
    PRISM_BASE_URL: http://prism:4010

# PHP Smoke тесты: Prism запускается в том же контейнере (сервис не имеет доступа к артефакту dist/openapi.yaml)
sdk-prism-php:
  stage: test
  image: php:8.2-cli
  needs:
    - job: bundle-openapi
      artifacts: true
    - job: generate-sdk-php
      artifacts: true
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /php/'
      when: on_success
  variables:
    PRISM_BASE_URL: http://localhost:4010
  before_script:
    - apt-get update && apt-get install -y git unzip curl
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
    - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
    - apt-get install -y nodejs
  script:
    - |
      set -e
      if [ ! -f "dist/openapi.yaml" ]; then
        echo "ERROR: dist/openapi.yaml not found (bundle-openapi artifact?)"
        exit 1
      fi
      echo "Starting Prism mock server on port 4010..."
      npx -y @stoplight/prism-cli mock -h 0.0.0.0 -p 4010 dist/openapi.yaml &
      PRISM_PID=$!
      for i in $(seq 1 20); do
        if curl -sf -o /dev/null http://localhost:4010/ 2>/dev/null; then
          echo "Prism is ready."
          break
        fi
        if [ "$i" -eq 20 ]; then
          echo "ERROR: Prism did not become ready in time"
          kill $PRISM_PID 2>/dev/null || true
          exit 1
        fi
        sleep 1
      done
      if [ -d "tests/php" ]; then
        cd tests/php
        if [ ! -f "bootstrap.php" ]; then
          printf '%s\n' '<?php' '$b=dirname(__DIR__,2); require __DIR__."/vendor/autoload.php"; if(file_exists($b."/clients/php/autoload.php")) require $b."/clients/php/autoload.php";' > bootstrap.php
        fi
        composer install --no-interaction
        echo "=== Smoke tests (PHP) vs Prism ==="
        vendor/bin/phpunit --testsuite smoke --testdox
      else
        echo "WARNING: tests/php directory not found"
        exit 1
      fi

