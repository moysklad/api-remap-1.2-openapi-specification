# Базовый шаблон для Prism smoke тестов
.sdk-prism-base:
  stage: test
  services:
    - name: stoplight/prism:4
      alias: prism
      # Prism запускается с bundled спецификацией из артефактов
      command: ["mock", "-h", "0.0.0.0", "/builds/$CI_PROJECT_PATH/dist/openapi.yaml"]
  variables:
    PRISM_BASE_URL: http://prism:4010

# PHP Smoke тесты с Prism mock сервером
sdk-prism-php:
  extends: .sdk-prism-base
  image: php:8.2-cli
  needs:
    - job: bundle-openapi
      artifacts: true
    - job: generate-sdk-php
      artifacts: true
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /php/'
      when: on_success
  before_script:
    - apt-get update && apt-get install -y git unzip curl
    - curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer
  script:
    - |
      if [ -d "tests/php" ]; then
        cd tests/php
        composer install --no-interaction
        vendor/bin/phpunit --testsuite smoke
      else
        echo "WARNING: tests/php directory not found, skipping PHP smoke tests"
        echo "Create tests/php directory with PHPUnit tests to enable"
        exit 1
      fi

