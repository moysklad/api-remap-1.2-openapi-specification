# PHP Golden JSON тесты (сериализация/десериализация)
sdk-golden-php:
  extends: .php-test-base
  stage: test
  needs:
    - job: generate-sdk-php
      artifacts: true
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /php/'
      when: on_success
  script:
    - |
      if [ -d "tests/php" ]; then
        cd tests/php
        # bootstrap.php обязателен для PHPUnit; создаём, если нет
        if [ ! -f "bootstrap.php" ]; then
          printf '%s\n' '<?php $b=dirname(__DIR__,2); require __DIR__."/vendor/autoload.php"; if(file_exists($b."/clients/php/autoload.php")) require $b."/clients/php/autoload.php";' > bootstrap.php
        fi
        composer install --no-interaction
        echo "=== Golden tests (PHP) ==="
        vendor/bin/phpunit --testsuite golden --testdox
      else
        echo "WARNING: tests/php directory not found"
        exit 1
      fi

