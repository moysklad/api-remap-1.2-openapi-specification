sdk-golden-java:
  extends: .maven-jdk11-image
  stage: test
  needs:
    - job: generate-sdk-java
      artifacts: true
      optional: true
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /java/'
      when: on_success
  script:
    - |
      if [ -d "tests/java/assertions" ]; then
        echo "=== Golden tests (Java) ==="
        mvn test -Dtest=**/golden/** -Dsurefire.failIfNoSpecifiedTests=false
      else
        echo "WARNING: tests/java/assertions directory not found"
        exit 1
      fi

