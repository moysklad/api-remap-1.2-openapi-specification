# Сборка bundled OpenAPI спецификации (нужна для smoke тестов и schemathesis)
bundle-openapi:
  stage: verify
  image: docker.infra.lognex/docker-openapitools:1.2-release
  needs:
    - job: lint-openapi
      optional: true
  script:
    - npm ci
    - npm run bundle
    - npm run bundle-json
  artifacts:
    paths:
      - dist/
    expire_in: 2 hours

# Базовый шаблон для генерации SDK
.generate-sdk-base:
  stage: generate-sdk
  image: docker.infra.lognex/docker-openapitools:1.2-release
  needs:
    - job: bundle-openapi
      artifacts: true
  cache:
    key:
      files:
        - package-lock.json
    paths:
      - /root/.npm/
  artifacts:
    paths:
      - clients/
    expire_in: 2 hours

# Генерация PHP SDK
generate-sdk-php:
  extends: .generate-sdk-base
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /php/'
      when: on_success
  script:
    - npm ci
    - npm run generate-php
    - echo "PHP SDK generated successfully"
  artifacts:
    paths:
      - clients/php/
    expire_in: 2 hours

