# Генерация Java SDK (заглушка, но активная job)
generate-sdk-java:
  extends: .generate-sdk-base
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /java/'
      when: on_success
  script:
    - npm ci
    - |
      if npm run | grep -q "generate-java"; then
        npm run generate-java
        echo "Java SDK generated successfully"
      else
        echo "WARNING: generate-java script not found in package.json"
        echo "To enable Java SDK generation, add the script to package.json"
        mkdir -p clients/java
        echo "# Java SDK placeholder" > clients/java/README.md
      fi
  artifacts:
    paths:
      - clients/java/
    expire_in: 2 hours

