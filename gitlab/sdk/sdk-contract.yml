# Режимы тестирования (SCHEMATHESIS_PHASES):
# - examples: базовые тесты с примерами из спецификации (по умолчанию)
# - coverage: расширенное покрытие всех комбинаций параметров
# - fuzzing: генерация случайных данных для поиска уязвимостей
# - stateful: тесты с изменением состояния
#
# По умолчанию: coverage. Job разбита на 4 path-shards через parallel:matrix.

deploy-contract-env:
  stage: before-contract-test
  image: $GLOBAL_DOCKER_URL/maven:7.8-release
  needs:
    - job: bundle-openapi
      artifacts: false
  rules:
    # Merge/push в master и ручной запуск (web)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "master"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - apt-get update
    - apt-get install -y --no-install-recommends git
    # По умолчанию берём последний тег репозитория moysklad без клонирования (только ls-remote)
    - |
      if [ -z "$PARAM_VERSION" ]; then      
        MOYSKLAD_REPO="https://gitlab-ci-token:${CI_JOB_TOKEN}@git.company.lognex/moysklad/moysklad.git"
        PARAM_VERSION=$(git ls-remote --tags "$MOYSKLAD_REPO" 2>/dev/null | sed -n 's|.*refs/tags/||p' | grep -v '\^{}' | grep '^R[0-9]' | sort -V | tail -1)
        export PARAM_VERSION="${PARAM_VERSION:-}"
        if [ -n "$PARAM_VERSION" ]; then
          echo "Using last tag from moysklad repo as PARAM_VERSION: $PARAM_VERSION"
        else
          echo "WARNING: Could not get tags from $MOYSKLAD_REPO, PARAM_VERSION is empty"
        fi
      fi
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "push" ] && [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        echo "Skipping contract environment deploy on master push; marking deploy-contract-env as passed."
        exit 0
      fi
    # Окружение для contract-тестов по умолчанию поднимаем с последнего тэга moysklad, если не задан $PARAM_VERSION
    # Schemathesis по OpenAPI: окружение живёт дольше дефолта client.py (20 мин); переопределить — переменной ENV_TTL_MINUTES
    - export ENV_TTL_MINUTES="${ENV_TTL_MINUTES:-60}"
    - python3 env_prepare.py "stable" "$CI_PIPELINE_ID" "$CI_JOB_ID" "$PARAM_VERSION" "remap12_minimal_ru"
    - export NAMESPACE=$(cat namespace-export-file)
    - export HTTP_API='https://api'
    - export DMS_API_ENDPOINT='testms-test.lognex.ru'
    - export API_HOST=$HTTP_API-$NAMESPACE.$DMS_API_ENDPOINT
    - echo "API_HOST=${API_HOST}" >> variable.env
    - echo "NAMESPACE=${NAMESPACE}" >> variable.env
  artifacts:
    reports:
      dotenv: variable.env

create-contract-user:
  stage: before-contract-test
  image: alpine:latest
  needs:
    - job: deploy-contract-env
      artifacts: true
  rules:
    # Merge/push в master и ручной запуск (web)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "master"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "push" ] && [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        echo "Skipping contract user creation on master push; marking create-contract-user as passed."
        exit 0
      fi
    - apk add --no-cache curl
    - |
      RESPONSE=$(curl --location -X POST "$API_HOST/api/remap/1.2/register" \
        --header 'Content-Type: application/x-www-form-urlencoded' \
        --header 'Accept-Encoding: gzip' \
        --data-urlencode 'email=schemathesis_user@moysklad-test.ru')
      echo "$RESPONSE"
      API_PASSWORD=$(echo "$RESPONSE" | sed -n 's/.*"password"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
      API_LOGIN=$(echo "$RESPONSE" | sed -n 's/.*"uid"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')
      echo "API_LOGIN=$API_LOGIN"
      echo "API_PASSWORD=$API_PASSWORD"
      echo "SCHEMATHESIS_LOGIN=$API_LOGIN" >> user.env
      echo "SCHEMATHESIS_PASSWORD=$API_PASSWORD" >> user.env
      echo "SCHEMATHESIS_HOST=$API_HOST" >> user.env
  artifacts:
    reports:
      dotenv: user.env

remove-contract-env:
  image: $GLOBAL_DOCKER_URL/maven:7.8-release
  stage: after-contract-test
  needs:
    - job: deploy-contract-env
      artifacts: true
  rules:
    # Merge/push в master и ручной запуск (web)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "master"'
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: manual
      allow_failure: true
    - when: never
  script:
    - python3 env_clean.py $NAMESPACE $CI_PIPELINE_ID $CI_JOB_ID

sdk-contract:
  stage: contract-test
  image: python:3.11
  parallel:
    matrix:
      - CONTRACT_SHARD: contract-a-b-d-e-g
      - CONTRACT_SHARD: contract-cashin-core
      - CONTRACT_SHARD: contract-cashin-batch
      - CONTRACT_SHARD: contract-cashin-metadata
      - CONTRACT_SHARD: contract-cashout-core
      - CONTRACT_SHARD: contract-cashout-batch
      - CONTRACT_SHARD: contract-cashout-metadata
      - CONTRACT_SHARD: contract-commissionreportin-core
      - CONTRACT_SHARD: contract-commissionreportin-batch
      - CONTRACT_SHARD: contract-commissionreportin-metadata
      - CONTRACT_SHARD: contract-commissionreportin-positions
      - CONTRACT_SHARD: contract-commissionreportin-returns
      - CONTRACT_SHARD: contract-counterparty-contract
      - CONTRACT_SHARD: contract-customerorder-core
      - CONTRACT_SHARD: contract-customerorder-batch
      - CONTRACT_SHARD: contract-customerorder-metadata
      - CONTRACT_SHARD: contract-customerorder-positions
      - CONTRACT_SHARD: contract-internalorder-core
      - CONTRACT_SHARD: contract-internalorder-batch
      - CONTRACT_SHARD: contract-internalorder-metadata
      - CONTRACT_SHARD: contract-internalorder-positions
      - CONTRACT_SHARD: contract-product
      - CONTRACT_SHARD: contract-purchaseorder-core
      - CONTRACT_SHARD: contract-purchaseorder-batch
      - CONTRACT_SHARD: contract-purchaseorder-metadata
      - CONTRACT_SHARD: contract-purchaseorder-positions
      - CONTRACT_SHARD: contract-r-z
  needs:
    - job: bundle-openapi
      artifacts: true
    - job: create-contract-user
      artifacts: true
  rules:
    # Merge/push в master и ручной запуск (web)
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_REF_NAME == "master"'
      when: on_success
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: on_success
    - when: never
  script:
    - |
      if [ "$CI_PIPELINE_SOURCE" = "push" ] && [ "$CI_COMMIT_REF_NAME" = "master" ]; then
        echo "Skipping Schemathesis execution on master push; marking sdk-contract as passed."
        exit 0
      fi
    - pip install "schemathesis==${SCHEMATHESIS_VERSION:-4.17.0}"
    - |
      if [ -z "$SCHEMATHESIS_HOST" ] || [ -z "$SCHEMATHESIS_LOGIN" ] || [ -z "$SCHEMATHESIS_PASSWORD" ]; then
        echo "ERROR: SCHEMATHESIS_* variables are not set. Environment was not prepared (create-contract-user did not run)."
        exit 1
      fi
      # Базовый URL API должен включать путь /api/remap/1.2 (как в servers в спецификации)
      case "$SCHEMATHESIS_HOST" in
        */api/remap/1.2) SCHEMATHESIS_BASE_URL="$SCHEMATHESIS_HOST" ;;
        */api/remap/1.2/) SCHEMATHESIS_BASE_URL="${SCHEMATHESIS_HOST%/}" ;;
        *) SCHEMATHESIS_BASE_URL="${SCHEMATHESIS_HOST%/}/api/remap/1.2" ;;
      esac
      
      # Режимы тестирования (по умолчанию: coverage).
      # examples отключён: операции с AttributeAbstract (oneOf без дискриминатора)
      # вызывают Schema Error при генерации примеров — это не дефект API.
      SCHEMATHESIS_PHASES="${SCHEMATHESIS_PHASES:-coverage}"
      # coverage в режиме all строит negative cases даже при excluded negative checks;
      # на сложных схемах это даёт основной timeout. При необходимости можно
      # переопределить SCHEMATHESIS_MODE=all в ручном pipeline.
      SCHEMATHESIS_MODE="${SCHEMATHESIS_MODE:-positive}"
      SCHEMATHESIS_MAX_EXAMPLES="${SCHEMATHESIS_MAX_EXAMPLES:-50}"
      SCHEMATHESIS_WORKERS="${SCHEMATHESIS_WORKERS:-auto}"
      SCHEMATHESIS_GENERATION_DATABASE="${SCHEMATHESIS_GENERATION_DATABASE:-none}"
      SCHEMATHESIS_REQUEST_TIMEOUT="${SCHEMATHESIS_REQUEST_TIMEOUT:-30}"
      SCHEMATHESIS_NO_SHRINK="${SCHEMATHESIS_NO_SHRINK:-1}"
      SCHEMATHESIS_INCLUDE_PATH_REGEX="${SCHEMATHESIS_INCLUDE_PATH_REGEX:-}"

      if [ -z "$SCHEMATHESIS_INCLUDE_PATH_REGEX" ]; then
        case "${CONTRACT_SHARD:-}" in
          contract-a-b-d-e-g)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^(/entity/(accumulationdiscount|assortment|bonusprogram|bonustransaction|bundle|discount|employee|group)(/|$)|/context/companysettings(/|$))'
            ;;
          contract-cashin-core)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/cashin($|/\{id\}$|/new$)'
            ;;
          contract-cashin-batch)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/cashin/(delete|batch)$'
            ;;
          contract-cashin-metadata)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/cashin/metadata(/|$)'
            ;;
          contract-cashout-core)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/cashout($|/\{id\}$|/new$)'
            ;;
          contract-cashout-batch)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/cashout/(delete|batch)$'
            ;;
          contract-cashout-metadata)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/cashout/metadata(/|$)'
            ;;
          contract-commissionreportin-core)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/commissionreportin($|/\{id\}$)'
            ;;
          contract-commissionreportin-batch)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/commissionreportin/(delete|batch)$'
            ;;
          contract-commissionreportin-metadata)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/commissionreportin/metadata(/|$)'
            ;;
          contract-commissionreportin-positions)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/commissionreportin/\{id\}/positions(/|$)'
            ;;
          contract-commissionreportin-returns)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/commissionreportin/\{id\}/returntocommissionerpositions(/|$)'
            ;;
          contract-counterparty-contract)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/(contract|counterparty|country|currency|customentity)(/|$)'
            ;;
          contract-customerorder-core)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/customerorder($|/\{id\}$|/new$)'
            ;;
          contract-customerorder-batch)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/customerorder/(delete|batch)$'
            ;;
          contract-customerorder-metadata)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/customerorder/metadata(/|$)'
            ;;
          contract-customerorder-positions)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/customerorder/\{id\}/positions(/|$)'
            ;;
          contract-internalorder-core)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/internalorder($|/\{id\}$|/new$)'
            ;;
          contract-internalorder-batch)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/internalorder/(delete|batch)$'
            ;;
          contract-internalorder-metadata)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/internalorder/metadata(/|$)'
            ;;
          contract-internalorder-positions)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/internalorder/\{id\}/positions(/|$)'
            ;;
          contract-product)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/(personaldiscount|product|productfolder)(/|$)'
            ;;
          contract-purchaseorder-core)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/purchaseorder($|/\{id\}$|/new$)'
            ;;
          contract-purchaseorder-batch)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/purchaseorder/(delete|batch)$'
            ;;
          contract-purchaseorder-metadata)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/purchaseorder/metadata(/|$)'
            ;;
          contract-purchaseorder-positions)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/purchaseorder/\{id\}/positions(/|$)'
            ;;
          contract-r-z)
            SCHEMATHESIS_INCLUDE_PATH_REGEX='^/entity/(retailstore|role|service|specialpricediscount|store|thing|uom|variant)(/|$)'
            ;;
        esac
      fi
      
      AUTH_HEADER=$(echo -n "${SCHEMATHESIS_LOGIN}:${SCHEMATHESIS_PASSWORD}" | base64)
      
      # Исключаемые проверки:
      # @see https://schemathesis.readthedocs.io/en/stable/reference/checks/
      # - unsupported_method: nginx возвращает 405 без заголовка Allow (требуется по RFC 9110)
      # - positive_data_acceptance: API может вернуть 400/412 при валидной по схеме дате (бизнес-правила);
      #   коды 400/412 документированы в спецификации
      # - negative_data_rejection: API принимает запросы с невалидными заголовками/параметрами
      #   (например, x-schemathesis-unknown-property) — поведение nginx/балансировщика, не дефект спеки
      EXCLUDE_CHECKS="positive_data_acceptance,unsupported_method,negative_data_rejection"
  
      echo "==> Running Schemathesis tests"
      echo "    Base URL: $SCHEMATHESIS_BASE_URL"
      echo "    Phases: $SCHEMATHESIS_PHASES"
      echo "    Mode: $SCHEMATHESIS_MODE"
      echo "    Max examples: $SCHEMATHESIS_MAX_EXAMPLES"
      echo "    Workers: $SCHEMATHESIS_WORKERS"
      echo "    Generation database: $SCHEMATHESIS_GENERATION_DATABASE"
      echo "    Request timeout: $SCHEMATHESIS_REQUEST_TIMEOUT"
      echo "    No shrink: $SCHEMATHESIS_NO_SHRINK"
      echo "    Shard: ${CONTRACT_SHARD:-all}"
      echo "    Include path regex: ${SCHEMATHESIS_INCLUDE_PATH_REGEX:-<none>}"
      echo "    Exclude checks: $EXCLUDE_CHECKS"

      set -- schemathesis run dist/openapi.yaml \
        --url "$SCHEMATHESIS_BASE_URL" \
        -H "Authorization: Basic $AUTH_HEADER" \
        -H 'Accept-Encoding: gzip, deflate, br' \
        --max-examples "$SCHEMATHESIS_MAX_EXAMPLES" \
        --phases "$SCHEMATHESIS_PHASES" \
        --mode "$SCHEMATHESIS_MODE" \
        --workers "$SCHEMATHESIS_WORKERS" \
        --exclude-checks "$EXCLUDE_CHECKS" \
        --generation-database "$SCHEMATHESIS_GENERATION_DATABASE" \
        --request-timeout "$SCHEMATHESIS_REQUEST_TIMEOUT"

      if [ "$SCHEMATHESIS_NO_SHRINK" = "1" ]; then
        set -- "$@" --no-shrink
      fi

      if [ -n "$SCHEMATHESIS_INCLUDE_PATH_REGEX" ]; then
        set -- "$@" --include-path-regex "$SCHEMATHESIS_INCLUDE_PATH_REGEX"
      fi

      "$@"
