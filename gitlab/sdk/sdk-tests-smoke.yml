# Smoke тесты: openapi-mock запускается в том же контейнере
# (GitLab CI service не имеет доступа к артефакту dist/openapi.yaml)
sdk-smoke:
  extends: .php-test-base
  stage: test
  needs:
    - job: bundle-smoke-openapi
      artifacts: true
  rules:
    - if: '$SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /php/'
      when: on_success
  variables:
    SMOKE_BASE_URL: http://localhost:8080
  script:
    - |
      set -e
      if [ ! -f "dist/openapi.yaml" ]; then
        echo "ERROR: dist/openapi.yaml not found (bundle-openapi artifact?)"
        exit 1
      fi

      echo "Starting openapi-mock server on port 8080..."
      MOCK_LOG=$(mktemp)
      OPENAPI_MOCK_SPECIFICATION_URL=dist/openapi.yaml \
      OPENAPI_MOCK_RESPONSE_TIMEOUT=30 \
        nohup openapi-mock serve >"$MOCK_LOG" 2>&1 &
      MOCK_PID=$!
      disown $MOCK_PID 2>/dev/null || true

      # Wait for mock server (typically starts in <2 seconds)
      for i in $(seq 1 30); do
        code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 5 http://localhost:8080/api/remap/1.2/entity/product 2>/dev/null || true)
        if [ -n "$code" ] && [ "$code" != "000" ]; then
          echo "openapi-mock is ready (HTTP $code)."
          break
        fi
        if [ "$i" -eq 30 ]; then
          echo "ERROR: openapi-mock did not become ready in time. Log:"
          cat "$MOCK_LOG" || true
          kill $MOCK_PID 2>/dev/null || true
          exit 1
        fi
        sleep 1
      done

      if [ -d "tests/php" ]; then
        cd tests/php
        if [ ! -f "bootstrap.php" ]; then
          printf '%s\n' '<?php' '$b=dirname(__DIR__,2); require __DIR__."/vendor/autoload.php"; if(file_exists($b."/clients/php/autoload.php")) require $b."/clients/php/autoload.php";' > bootstrap.php
        fi
        composer install --no-interaction
        # Verify mock server is still responding
        code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 2 --max-time 5 http://localhost:8080/api/remap/1.2/entity/product 2>/dev/null || true)
        if [ -z "$code" ] || [ "$code" = "000" ]; then
          echo "ERROR: openapi-mock no longer responding before PHPUnit. Log:"
          cat "$MOCK_LOG" 2>/dev/null || true
          exit 1
        fi
        echo "=== Smoke tests (PHP) vs openapi-mock ==="
        vendor/bin/phpunit --testsuite smoke --testdox
      else
        echo "WARNING: tests/php directory not found"
        exit 1
      fi
