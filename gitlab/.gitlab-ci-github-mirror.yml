mirror-to-github:
  image: docker.infra.lognex/docker-openapitools:1.0-release
  stage: mirror
  before_script:
    - git config --global user.name "$GIT_USER"
    - git config --global user.email "$GIT_MAIL"
  script:
    - git clone $CI_REPOSITORY_URL temp_dir && cd temp_dir
    - git remote add github https://$GIT_PASSWORD@github.com/moysklad/api-remap-1.2-openapi-specification.git
    - git checkout $CI_COMMIT_REF_NAME
    - |
      HAS_CHANGES=false

      if [ -d "gitlab" ]; then
        echo "Removing gitlab directory..."
        rm -rf gitlab
        HAS_CHANGES=true
      fi
      
      if [ -d ".gitlab-ci.yml" ]; then
        echo "Removing gitlab-ci.yml..."
        rm -rf gitlab-ci.yml
        HAS_CHANGES=true
      fi

      if [ "$HAS_CHANGES" = true ]; then
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "Remove GitLab-specific files for GitHub mirror"
          echo "GitLab-specific files removed and committed"
        fi
      else
        echo "No GitLab-specific files found to remove"
      fi
      
      git filter-branch --force --index-filter \
      "git rm --cached --ignore-unmatch -r ./.gitlab-ci.yml ./.gitlab-ci.yaml ./gitlab" \
      --prune-empty --tag-name-filter cat -- --all
      
      git push github $CI_COMMIT_REF_NAME --force --no-verify
      echo "Successfully mirrored to GitHub without GitLab-specific files"
  variables:
    GIT_STRATEGY: clone