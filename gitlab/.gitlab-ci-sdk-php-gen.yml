# Push SDK to Remote Repositories
# 
# Этот файл содержит job'ы для пуша сгенерированных SDK в удалённые репозитории.
# Job'ы выполняются только если PUSH_TO_REMOTE=true
#
# Требуемые переменные:
# - GIT_PASSWORD: токен для доступа к GitHub
# - PUSH_TO_REMOTE: должен быть "true" для выполнения пуша

# Базовый шаблон для пуша SDK
.push-sdk-base:
  image: docker.infra.lognex/docker-openapitools:1.2-release
  stage: push-sdk
  rules:
    - if: '$PUSH_TO_REMOTE == "true" && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "release"'
      when: on_success
    - when: never
  before_script:
    - git config --global user.name "sdk-bot"
    - git config --global user.email "sdk-bot@users.noreply.github.com"

# Push PHP SDK to GitHub
push-sdk-php:
  extends: .push-sdk-base
  needs:
    - job: generate-sdk-php
      artifacts: true
    - job: sdk-golden-php
    - job: sdk-prism-php
  rules:
    - if: '$PUSH_TO_REMOTE == "true" && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "release" && ($SDK_LANGUAGES == "" || $SDK_LANGUAGES =~ /php/)'
      when: on_success
    - when: never
  variables:
    SDK_BRANCH: $CI_COMMIT_REF_NAME
    SDK_REPO_URL: github.com/moysklad/php-remap-1.2-sdk
    SDK_REPO_SLUG: moysklad/php-remap-1.2-sdk
  script:
    - |
      if [ ! -d "clients/php" ]; then
        echo "Directory clients/php not found. Nothing to sync."
        exit 0
      fi

    - git clone --depth=1 --filter=blob:none --single-branch --branch master "https://$GIT_PASSWORD@${SDK_REPO_URL}.git" sdk-repo
    - cd sdk-repo
    - git checkout -B "$SDK_BRANCH"

    - rsync -a --delete --exclude ".git" ../clients/php/lib ./

    - git add -A
    - |
      if git diff --staged --quiet; then
        echo "No changes to commit in SDK repository. Skipping push."
        exit 0
      fi
    - git commit -m "$SDK_BRANCH Auto-generated PHP SDK from OpenAPI specification"
    - git push -u origin "$SDK_BRANCH" --force

    - export GH_TOKEN="${GIT_PASSWORD}"
    - gh pr create --repo "$SDK_REPO_SLUG" --base "master" --head "$SDK_BRANCH" --title "$SDK_BRANCH Auto-generated PHP SDK from OpenAPI specification" --body "This PR updates the auto-generated PHP SDK from the OpenAPI spec." --fill --web=false || true

