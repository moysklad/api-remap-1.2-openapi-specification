# =============================================================================
# МойСклад SDK Builder - GitLab CI/CD Pipeline
# =============================================================================
#
# Этот пайплайн управляет генерацией и валидацией SDK для МойСклад API.
#
# СЦЕНАРИИ ЗАПУСКА:
#
# 1. Push в ветку (кроме master/release):
#    - lint-openapi: проверка OpenAPI спецификации
#    - bundle-openapi: сборка bundled версии
#    - generate-sdk-*: генерация SDK для выбранных языков
#    - sdk-golden-*: golden тесты (сериализация/десериализация)
#    - sdk-smoke-*: smoke тесты с openapi-mock сервером
#    - prep-branch-and-mr-*: создание/обновление ветки и mr по сгенерированному sdk в репозитории sdk
#
# 2. Ручной запуск (web) на ветке (без тэга):
#    - lint-openapi и bundle-openapi
#    - generate-sdk-*: генерация SDK
#    - sdk-golden-*/sdk-smoke-*: тесты SDK
#    - sdk-contract: schemathesis контрактные тесты
#    - deploy-contract-env/create-contract-user/remove-contract-env: подготовка и очистка окружения для sdk-contract
#    - push-sdk-*: пуш SDK в удалённые репозитории (если PUSH_TO_REMOTE=true)
#
# 3. Merge/push в master:
#    - check-openapi-changes: проверка изменений OpenAPI относительно последнего тега
#    - lint-openapi и bundle-openapi
#    - deploy-contract-env/create-contract-user/remove-contract-env и sdk-contract
#    - generate-sdk-*, sdk-golden-*, sdk-smoke-*
#    - version:auto: автоматическое версионирование и CHANGELOG/тег
#    - mirror-to-github и create-github-release: зеркалирование и GitHub Release
#    - merge-branch-*: обновление ветки master на удаленном gitlab sdk репозитории по сгенерированному sdk и выпуск тэга
#
# 4. Старый Java SDK пайплайн ($USE_OLD_SDK == "true"'):
#    - Сохранён для обратной совместимости
#
# ПЕРЕМЕННЫЕ:
#
# SDK_LANGUAGES:
#   Языки для генерации SDK, через запятую без пробелов.
#   Примеры: "php", "php,python,java", "" (пустая строка = все доступные)
#   По умолчанию: "" (генерируются все доступные SDK)
#
# SCHEMATHESIS_HOST:
#   URL API сервера для schemathesis тестов (например: https://api-api-1.testms-test.lognex.ru)
#   Обязателен при ручном запуске
#
# SCHEMATHESIS_LOGIN:
#   Логин для авторизации в API (Basic auth)
#   Обязателен при ручном запуске
#
# SCHEMATHESIS_PASSWORD:
#   Пароль для авторизации в API (Basic auth)
#   Обязателен при ручном запуске
#
# GIT_PASSWORD:
#   Токен для доступа к GitHub (нужен для PUSH_TO_REMOTE=true и зеркалирования)
#
# SPEC_SDK_GENERATION:
#   Флаг для переключения между старым Java SDK и новым OpenAPI пайплайном.
#   Значения: "true" - новый пайплайн, иначе - старый Java SDK
#
# =============================================================================

# Запускать пайплайн только для push и web; merge request pipelines отключены,
# чтобы не создавался второй пустой пайплайн при наличии открытого MR.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: never
    - when: always

# Переменные по умолчанию
variables:
  SDK_LANGUAGES: ""
  PUSH_TO_REMOTE: "false"

# Сделано через два отдельных пути, чтобы разделить пайплайн где сдк генерится openapi и старой ручной java sdk
include:
  # Старый Java SDK пайплайн (для обратной совместимости)
  - local: 'gitlab/.gitlab-ci-java-sdk.yml'
    rules:
      - if: '$SPEC_SDK_GENERATION != "true" && $CI_PIPELINE_SOURCE != "push" && $CI_PIPELINE_SOURCE == "web" && $USE_OLD_SDK == "true"'

  # Старый PHP SDK пайплайн через openapi (для обратной совместимости при SPEC_SDK_GENERATION=true)
  - local: 'gitlab/.gitlab-ci-spec-gen.yml'
    rules:
      - if: '$SPEC_SDK_GENERATION == "true" && $CI_PIPELINE_SOURCE != "push" && $CI_PIPELINE_SOURCE != "web"'

  # SDK Validation - при push в любую ветку и при web
  - local: 'gitlab/.gitlab-ci-sdk-validate.yml'
    rules:
      - if: '$CI_PIPELINE_SOURCE == "push"'
      - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_TAG == null  && $USE_OLD_SDK != "true"'

  # GitHub Mirror - при merge в master
  - local: 'gitlab/.gitlab-ci-github-mirror.yml'
    rules:
      - if: '$CI_COMMIT_REF_NAME == "master" && $CI_PIPELINE_SOURCE == "push"'

  # Автоматическое версионирование и выпуск тега - master (push)
  - local: 'gitlab/version.gitlab-ci.yml'
    rules:
      - if: '$CI_COMMIT_REF_NAME == "master" && $CI_PIPELINE_SOURCE == "push"'
  # Подготовка|внесение изменений в репозиторий PHP SDK в GitLab
  - local: 'gitlab/.gitlab-ci-prepare-sdk-php.yml'
    rules:
      # Ветки (push)
      - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_TAG == null'
      # Ветки (ручной запуск web, без тега)
      - if: '$CI_PIPELINE_SOURCE == "web" && $CI_COMMIT_TAG == null'

stages:
  - changes-check          # Ранний этап: проверка изменений OpenAPI относительно последнего тега
  - verify                 # Проверка спецификации, окружения
  - prepare                # Подготовка (старый пайплайн)
  - deploy-for-space       # Деплой тестового окружения (старый пайплайн)
  - create-user            # Создание пользователя (старый пайплайн)
  - build                  # Сборка (старый пайплайн)
  - delete-space           # Удаление тестового окружения (старый пайплайн)
  - before-contract-test   # Подготовка окружения для contract-тестов
  - contract-test          # Контрактные тесты (schemathesis) — после verify, до generate-sdk
  - after-contract-test    # Удаление окружения после contract-тестов
  - generate-sdk           # Генерация SDK для различных языков
  - test                   # Тестирование: golden, smoke (prism)
  - version                # Автоматическое версионирование и подготовка CHANGELOG/тегов
  - mirror                 # Зеркалирование в GitHub
  - prepare-sdk-repository # Подготовка|внесение изменений в репозиторий PHP SDK в GitLab