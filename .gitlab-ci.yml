image: $GLOBAL_DOCKER_URL/maven:3.4-release

workflow:
  name: '$PROJECT1_PIPELINE_NAME'
  rules:
    - if: '$BRANCH != "release" && $CI_PIPELINE_SOURCE == "web"'
      variables:
        PROJECT1_PIPELINE_NAME: 'Feature $BRANCH pipeline'
    - if: '$BRANCH == "release" && $CI_PIPELINE_SOURCE == "web"'
      variables:
        PROJECT1_PIPELINE_NAME: 'Release pipeline'

stages:
  - build
  - deploy

variables:
  MAVEN_CLI_OPTS: "--batch-mode"

build-for-tests:
  stage: build
  rules:
    - if: '$BRANCH != "release"'
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - git clone https://github.com/moysklad/java-remap-sdk-1.2.git
    - cd java-remap-sdk-1.2
    - export TZ='Europe/Moscow'
  script:
    - if [ -z "$BRANCH" ]; then
        BRANCH='master';
      fi
    - git checkout $BRANCH;
    - ARTEFACT_VERSION="${BRANCH}-${CI_PIPELINE_ID}"
    - mvn versions:set -DnewVersion=$ARTEFACT_VERSION -DgenerateBackupPoms=false;
    - mvn $MAVEN_CLI_OPTS -Ppublishing-artifactory clean deploy -DartifactoryRepo=${ARTIFACTORY_REPO_URL};
    - echo "Complete. Version $ARTEFACT_VERSION"

deploy-to-maven:
  stage: build
  rules:
    - if: '$BRANCH == "release"'
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - echo "$GPG_SECRET_KEY" | gpg --import
    - apt-get update
    - apt-get install -y --no-install-recommends git
    - git clone https://github.com/moysklad/java-remap-sdk-1.2.git
    - cd java-remap-sdk-1.2
    - export TZ='Europe/Moscow'
  script:
    - |
      echo "Adding the ossrh server inside <servers> section"
        sed -i '/<servers>/a \
        <server>\
          <id>central</id>\
          <username>${CENTRAL_USER}</username>\
          <password>${CENTRAL_PASSWORD}</password>\
        </server>' ~/.m2/settings.xml

    - git checkout master
    - git config user.name "$GIT_USER"
    - git config user.email "$GIT_MAIL"
    - mvn $MAVEN_CLI_OPTS -Dusername=$GIT_USER -Dpassword=$GIT_PASSWORD -Ppublishing-central release:prepare
    - mvn -Ppublishing-central release:perform

mirror-to-github:
  stage: deploy
  only:
    - master
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - echo "$GPG_SECRET_KEY" | gpg --import
    - apt-get update
    - apt-get install -y --no-install-recommends git
  script:
    - git clone $CI_REPOSITORY_URL temp_dir && cd temp_dir
    - git remote add github https://$GIT_PASSWORD@github.com/moysklad/api-remap-1.2-openapi-specification.git
    - git checkout $CI_COMMIT_REF_NAME
    - git config user.name "$GIT_USER"
    - git config user.email "$GIT_MAIL"
    - |
      if [ -f ".gitlab-ci.yml" ] || [ -f ".gitlab-ci.yaml" ]; then
        echo "Found GitLab CI files, removing them..."
        rm -f .gitlab-ci.yml .gitlab-ci.yaml
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "Remove GitLab CI files for GitHub mirror [skip ci]"
          echo "GitLab CI files removed and committed"
        fi
        git push github $CI_COMMIT_REF_NAME --force
        echo "Successfully mirrored to GitHub without GitLab CI files"
      else
        git push github $CI_COMMIT_REF_NAME
        echo "Successfully mirrored to GitHub (no GitLab CI files found)"
      fi
  variables:
    GIT_STRATEGY: clone