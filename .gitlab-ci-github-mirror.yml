image: $GLOBAL_DOCKER_URL/maven:3.4-release

mirror-to-github:
  stage: mirror
  before_script:
    - rm -f /etc/apt/sources.list.d/*pgdg*.list || true
    - echo "$GPG_SECRET_KEY" | gpg --import
    - apt-get update
    - apt-get install -y --no-install-recommends git
  script:
    - git clone $CI_REPOSITORY_URL temp_dir && cd temp_dir
    - git remote add github https://$GIT_PASSWORD@github.com/moysklad/api-remap-1.2-openapi-specification.git
    - git checkout $CI_COMMIT_REF_NAME
    - git config user.name "$GIT_USER"
    - git config user.email "$GIT_MAIL"
    - |
      HAS_CHANGES=false
      
      echo "Checking for YAML files to remove..."
      find . -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) -exec echo "Removing: {}" \; -delete

      if find . -maxdepth 1 -type f \( -name "*.yml" -o -name "*.yaml" \) | grep -q .; then
        echo "YAML files were found and removed"
        HAS_CHANGES=true
      fi

      if [ -d "gitlab" ]; then
        echo "Removing gitlab directory..."
        rm -rf gitlab
        HAS_CHANGES=true
      fi

      if [ "$HAS_CHANGES" = true ]; then
        git add -A
        if git diff-index --quiet HEAD --; then
          echo "No changes to commit"
        else
          git commit -m "Remove GitLab-specific files for GitHub mirror"
          echo "GitLab-specific files removed and committed"
        fi
      else
        echo "No GitLab-specific files found to remove"
      fi
      
      git push github $CI_COMMIT_REF_NAME --force
      echo "Successfully mirrored to GitHub without GitLab-specific files"
  variables:
    GIT_STRATEGY: clone