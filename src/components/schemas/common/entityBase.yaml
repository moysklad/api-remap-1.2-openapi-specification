BatchResponseEntity:
  type: object
  description: |
    Базовый полиморфный тип элемента ответа массовой операции.
    Элемент может быть объектом ошибки или сущностью с `meta`.
    `meta` объявлен здесь технически: он заставляет SDK-генераторы создать
    полноценную базовую модель для элементов batch-ответа.
  properties:
    meta:
      $ref: './meta.yaml'
  # Ошибка в batch-ответе не содержит meta.type, поэтому для нее нужен
  # отдельный fallback вместо обычного resolve по x-polymorphic-discriminator.
  x-polymorphic-missing-discriminator-component: Error
  x-polymorphic-discriminator:
    path: meta.type
    mappings: &entityWithMetaPolymorphicMappings
      - type: bundle
        componentName: Bundle
      - type: cashin
        componentName: CashIn
      - type: cashout
        componentName: CashOut
      - type: commissionreportin
        componentName: CommissionReportIn
      - type: commissionreportout
        componentName: CommissionReportOut
      - type: commissionreportoutposition
        componentName: CommissionReportOutPosition
      - type: consignment
        componentName: Consignment
      - type: contract
        componentName: Contract
      - type: counterparty
        componentName: Counterparty
      - type: country
        componentName: Country
      - type: currency
        componentName: Currency
      - type: customerorder
        componentName: CustomerOrder
      - type: demand
        componentName: Demand
      - type: emissionorder
        componentName: EmissionOrder
      - type: emissionorderposition
        componentName: EmissionOrderPosition
      - type: employee
        componentName: Employee
      - type: enter
        componentName: Enter
      - type: expenseitem
        componentName: ExpenseItem
      - type: internalorder
        componentName: InternalOrder
      - type: inventory
        componentName: Inventory
      - type: loss
        componentName: Loss
      - type: move
        componentName: Move
      - type: moveposition
        componentName: MovePosition
      - type: organization
        componentName: Organization
      - type: paymentin
        componentName: PaymentIn
      - type: paymentout
        componentName: PaymentOut
      - type: pricetype
        componentName: PriceType
      - type: processing
        componentName: Processing
      - type: processingorder
        componentName: ProcessingOrder
      - type: processingplan
        componentName: ProcessingPlan
      - type: processingplanfolder
        componentName: ProcessingPlanFolder
      - type: processingprocess
        componentName: ProcessingProcess
      - type: processingstage
        componentName: ProcessingStage
      - type: product
        componentName: Product
      - type: productfolder
        componentName: ProductFolder
      - type: project
        componentName: Project
      - type: purchaseorder
        componentName: PurchaseOrder
      - type: purchasereturn
        componentName: PurchaseReturn
      - type: retaildemand
        componentName: RetailDemand
      - type: retaildrawercashin
        componentName: RetailDrawerCashIn
      - type: retaildrawercashout
        componentName: RetailDrawerCashOut
      - type: retailstore
        componentName: RetailStore
      - type: saleschannel
        componentName: SalesChannel
      - type: salesreturn
        componentName: SalesReturn
      - type: service
        componentName: Service
      - type: store
        componentName: Store
      - type: supply
        componentName: Supply
      - type: supplyposition
        componentName: SupplyPosition
      - type: task
        componentName: Task
      - type: tasknote
        componentName: TaskNote
      - type: taxrate
        componentName: TaxRate
      - type: uom
        componentName: Uom
      - type: variant
        componentName: Variant
      - type: webhook
        componentName: Webhook
      - type: webhookstock
        componentName: WebhookStock

EntityWithMeta:
  type: object
  description: |
    Базовый полиморфный тип для сущностей с `meta`.
    Конкретный тип определяется по `meta.type`.
  x-polymorphic-parent: BatchResponseEntity
  properties:
    meta:
      $ref: './meta.yaml'
  x-polymorphic-discriminator:
    path: meta.type
    mappings: *entityWithMetaPolymorphicMappings
