type: object
description: Информация о смене ККТ
properties:
  start:
    type: object
    nullable: true
    description: Информация об открытии смены ККТ
    properties:
      fnNumber:
        type: string
        description: Номер фискального накопителя
      kktRegNumber:
        type: string
        description: Регистрационный номер ККТ
      fiscalDocSign:
        type: string
        description: Фискальный признак документа
      shiftNumber:
        type: string
        description: Номер смены ККТ
      fiscalDocNumber:
        type: string
        description: Номер фискального документа
      time:
        type: string
        description: Дата и время открытия смены
  end:
    type: object
    nullable: true
    description: Информация о закрытии смены ККТ
    properties:
      chequesTotal:
        type: integer
        description: Количество чеков за смену
      fiscalDocNumber:
        type: string
        description: Номер фискального документа
      fiscalDocSign:
        type: string
        description: Фискальный признак документа
      fiscalDocsTotal:
        type: integer
        description: Количество фискальных документов за смену
      fnNumber:
        type: string
        description: Номер фискального накопителя
      kktRegNumber:
        type: string
        description: Регистрационный номер ККТ
      shiftNumber:
        type: string
        description: Номер смены ККТ
      time:
        type: string
        description: Дата и время закрытия смены
