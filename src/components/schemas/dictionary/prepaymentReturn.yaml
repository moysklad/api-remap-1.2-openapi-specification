type: object
description: Возврат предоплаты
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "prepaymentreturn"
    - param: "id"
  type: "prepaymentreturn"
properties:
  meta:
    description: Метаданные Возврата предоплаты
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Возврата предоплаты
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование Возврата предоплаты
  code:
    type: string
    maxLength: 255
    description: Код Возврата предоплаты
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Возврата предоплаты
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Возврата предоплаты
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления Возврата предоплаты
    readOnly: true
  updated:
    type: string
    description: Момент последнего обновления Возврата предоплаты
    readOnly: true
  moment:
    type: string
    description: Дата документа
  applicable:
    type: boolean
    description: Отметка о проведении
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  shared:
    type: boolean
    description: Общий доступ
  vatEnabled:
    type: boolean
    description: Учитывается ли НДС
  vatIncluded:
    type: boolean
    description: Включен ли НДС в цену
  vatSum:
    type: number
    format: double
    description: Сумма НДС
  sum:
    type: number
    format: double
    description: Сумма Возврата предоплаты в копейках
    readOnly: true
  cashSum:
    type: number
    format: double
    description: Оплачено наличными
  noCashSum:
    type: number
    format: double
    description: Оплачено картой
  qrSum:
    type: number
    format: double
    description: Оплачено по QR-коду
  agent:
    description: Метаданные Контрагента или юрлица
    x-agent-reference: true
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Agent'
  organization:
    description: Метаданные юрлица
    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  owner:
    description: Владелец (Сотрудник)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  group:
    description: Отдел сотрудника
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  attributes:
    type: array
    nullable: true
    description: Коллекция метаданных доп. полей
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  files:
    description: Метаданные массива Файлов
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  rate: |
    Валюта документа. 
    Если значение курса валюты не указано, используется курс из справочника валют.
  $ref: '../../../openapi.yaml#/components/schemas/CurrencyRate'
  positions:
    type: object
    description: Позиции Возврата предоплаты
    $ref: '../../../openapi.yaml#/components/schemas/PrepaymentReturnPositionList'
  prepayment:
    description: Метаданные Предоплаты
    $ref: '../../../openapi.yaml#/components/schemas/Prepayment'
  retailShift:
    description: Метаданные розничной смены
    $ref: '../../../openapi.yaml#/components/schemas/RetailShift'
  retailStore:
    description: Метаданные Точки продаж
    $ref: '../../../openapi.yaml#/components/schemas/RetailStore'
  state:
    description: Метаданные статуса Возврата предоплаты
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  taxSystem:
    type: string
    description: Код системы налогообложения. Известные значения описаны в TaxSystem
    example: "GENERAL_TAX_SYSTEM"
