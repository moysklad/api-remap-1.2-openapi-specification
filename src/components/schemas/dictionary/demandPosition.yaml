type: object
description: Позиция Отгрузки
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "demand"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "demandposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации/комплекта, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  cost:
    type: integer
    description: Себестоимость (только для услуг)
  declaration:
    type: array
    description: |
      Информация о прослеживаемости импортных товаров (ГТД, РНПТ и связанное количество).
      Не входит в ответ по умолчанию; может быть возвращена только при явном запросе расширенного набора полей для позиций документа.
      Только для чтения.
    readOnly: true
    items:
      type: object
      description: Запись о движении импортных товаров по ГТД или РНПТ
      properties:
        gtd:
          type: string
          description: Грузовая таможенная декларация
          readOnly: true
        rnpt:
          type: string
          description: Регистрационный номер партии товара (прослеживаемый товар)
          readOnly: true
        country:
          description: Страна происхождения товара
          readOnly: true
          nullable: true
          type: object
          allOf:
            - $ref: '../../../openapi.yaml#/components/schemas/Country'
        quantity:
          type: number
          format: double
          description: Количество товара с указанными ГТД или РНПТ в позиции документа
          readOnly: true
  discount:
    type: number
    format: double
    description: Процент скидки или наценки. Наценка указывается отрицательным числом (например, `-10` задаёт наценку 10%).
  pack:
    description: Упаковка Товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: |
      Количество товаров/услуг данного вида в позиции.
      Если позиция — товар с учётом по серийным номерам, значение всегда равно количеству серийных номеров для этой позиции в документе.
  slot:
    description: Ячейка на складе
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/StoreSlot'
  things:
    type: array
    description: |
      Серийные номера. Игнорируется, если товар позиции не на серийном учёте;
      иначе количество единиц в позиции совпадает с числом переданных серийных номеров.
    items:
      type: string
  trackingCodes:
    type: array
    description: |
      Коды маркировки товаров и транспортных упаковок (иерархическая структура).
      Количество кодов маркировки не влияет на поле quantity позиции.
    items:
      $ref: '../../../openapi.yaml#/components/schemas/DemandPositionTrackingCode'
  trackingCodes_1162:
    type: array
    description: Коды маркировки в формате тега 1162 (иерархическая структура). Только для чтения в ответе.
    items:
      $ref: '../../../openapi.yaml#/components/schemas/DemandPositionTrackingCode1162'
  overhead:
    type: integer
    description: |
      Накладные расходы по позиции.
      Если позиции Отгрузки не заданы, накладные расходы на уровне документа задать нельзя.
    readOnly: true
  vat:
    type: integer
    description: НДС, которым облагается текущая позиция
    minimum: 0
    maximum: 100
  vatEnabled:
    type: boolean
    description: |
      Включён ли НДС для позиции. Пара `(vat = 0, vatEnabled = false)` соответствует НДС «без НДС»;
      `(vat = 0, vatEnabled = true)` — НДС 0%.
