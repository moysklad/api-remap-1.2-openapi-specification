type: object
description: Позиция Возврата поставщику
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "purchasereturn"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "purchasereturnposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  discount:
    type: number
    format: double
    description: Процент скидки или наценки
  pack:
    description: Упаковка Товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: Количество товаров данного вида в позиции
  slot:
    description: Ячейка на складе
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/StoreSlot'
  things:
    type: array
    description: |
      Серийные номера. Игнорируется, если товар позиции не на серийном учёте;
      иначе количество единиц в позиции совпадает с числом переданных серийных номеров.
    items:
      type: string
  vat:
    type: integer
    description: НДС, которым облагается текущая позиция
  vatEnabled:
    type: boolean
    description: |
      Включён ли НДС для позиции. Пара `(vat = 0, vatEnabled = false)` соответствует НДС «без НДС»;
      `(vat = 0, vatEnabled = true)` — НДС 0%.
