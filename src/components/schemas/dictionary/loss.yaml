type: object
description: Списание
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "loss"
    - param: "id"
  type: "loss"
properties:
  meta:
    description: Метаданные Списания
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Списания
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  applicable:
    type: boolean
    description: Отметка о проведении
  attributes:
    type: array
    nullable: true
    description: Коллекция метаданных доп. полей
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  code:
    type: string
    maxLength: 255
    description: Код Списания
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления Списания
    readOnly: true
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Списания
  expenseItem:
    description: Метаданные Статьи расходов
    readOnly: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/ExpenseItem'
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Списания
  files:
    description: Метаданные массива Файлов (Максимальное количество файлов - 100)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  group:
    description: Отдел сотрудника
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  moment:
    type: string
    description: Дата документа
  name:
    type: string
    maxLength: 255
    description: Наименование Списания
  organization:
    description: Метаданные юрлица
    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  owner:
    description: Владелец (Сотрудник)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  positions:
    type: object
    description: Метаданные позиций Списания
    $ref: '../../../openapi.yaml#/components/schemas/LossPositionList'
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  project:
    description: Метаданные проекта
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Project'
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  rate:
    description: |
      Валюта документа. 
      Если значение курса валюты не указано, используется курс из справочника валют.
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/CurrencyRate'
  shared:
    type: boolean
    description: Общий доступ
  state:
    description: Метаданные статуса Списания
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  store:
    description: Метаданные склада
    $ref: '../../../openapi.yaml#/components/schemas/Store'
  sum:
    type: number
    format: double
    description: Сумма Списания в копейках
    readOnly: true
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  updated:
    type: string
    description: Момент последнего обновления Списания
    readOnly: true
  salesReturn:
    description: Связанный со Списанием возврат покупателя
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/SalesReturn'
  inventory:
    description: Связанная со Списанием инвентаризация
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Inventory'
