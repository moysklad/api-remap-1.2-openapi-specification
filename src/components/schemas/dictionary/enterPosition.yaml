type: object
description: Позиция Оприходования
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "enter"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "enterposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  country:
    description: Метаданные страны
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Country'
  gtd:
    type: object
    nullable: true
    description: Грузовая таможенная декларация
    properties:
      name:
        type: string
        description: Номер ГТД
  overhead:
    type: integer
    description: Накладные расходы
    readOnly: true
  pack:
    description: Упаковка Товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: Количество товаров данного вида в позиции
  reason:
    type: string
    nullable: true
    maxLength: 255
    description: Причина оприходования данной позиции
  slot:
    description: Ячейка на складе
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/StoreSlot'
  things:
    type: array
    description: |
      Серийные номера. Игнорируется, если товар позиции не на серийном учёте;
      иначе количество единиц в позиции совпадает с числом переданных серийных номеров.
    items:
      type: string
