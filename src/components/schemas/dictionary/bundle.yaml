type: object
description: Комплект
properties:
  meta:
    description: Метаданные Комплекта
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Комплекта
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование Комплекта
  code:
    type: string
    maxLength: 255
    description: Код Комплекта
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Комплекта
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  updated:
    type: string
    description: Момент последнего обновления сущности
    readOnly: true
  archived:
    type: boolean
    description: Добавлен ли Комплект в архив
  shared:
    type: boolean
    description: Общий доступ
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Описание Комплекта
  article:
    type: string
    maxLength: 255
    description: Артикул
  pathName:
    type: string
    description: Наименование группы, в которую входит Комплект
    readOnly: true
  discountProhibited:
    type: boolean
    description: Признак запрета скидок
  partialDisposal:
    type: boolean
    description: Управление состоянием частичного выбытия маркированного товара
  vat:
    type: integer
    description: НДС %
  vatEnabled:
    type: boolean
    description: Включен ли НДС для товара
  useParentVat:
    type: boolean
    description: Используется ли ставка НДС родительской группы
  effectiveVat:
    type: integer
    description: Реальный НДС %
    readOnly: true
  effectiveVatEnabled:
    type: boolean
    description: Дополнительный признак для определения разграничения реального НДС
    readOnly: true
  paymentItemType:
    type: string
    description: Признак предмета расчета
    enum:
      - GOOD
      - EXCISABLE_GOOD
      - COMPOUND_PAYMENT_ITEM
      - ANOTHER_PAYMENT_ITEM
  taxSystem:
    type: string
    description: Код системы налогообложения
    enum:
      - GENERAL_TAX_SYSTEM
      - SIMPLIFIED_TAX_SYSTEM_INCOME
      - SIMPLIFIED_TAX_SYSTEM_INCOME_OUTCOME
      - UNIFIED_AGRICULTURAL_TAX
      - PRESUMPTIVE_TAX_SYSTEM
      - PATENT_BASED
      - TAX_SYSTEM_SAME_AS_GROUP
  trackingType:
    type: string
    description: Тип маркируемой продукции
  tnved:
    type: string
    maxLength: 255
    description: Код ТН ВЭД
  weight:
    type: number
    format: float
    description: Вес
  volume:
    type: number
    format: float
    description: Объем
  group:
    description: Метаданные отдела сотрудника
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  owner:
    description: Метаданные владельца (Сотрудника)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  country:
    description: Метаданные Страны
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Country'
  uom:
    description: Единицы измерения
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Uom'
  productFolder:
    description: Метаданные группы Комплекта
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/ProductFolder'
  images:
    description: Массив метаданных Изображений
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/ImageList'
  files:
    description: Метаданные массива Файлов
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  barcodes:
    type: array
    description: Штрихкоды Комплекта
    items:
      $ref: '../../../openapi.yaml#/components/schemas/Barcode'
  packs:
    type: array
    description: Упаковки Комплекта
    items:
      $ref: '../../../openapi.yaml#/components/schemas/Pack'
  salePrices:
    type: array
    description: Цены продажи
    items:
      $ref: '../../../openapi.yaml#/components/schemas/SalePrice'
  buyPrice:
    description: Закупочная цена
    $ref: '../../../openapi.yaml#/components/schemas/BuyPrice'
  minPrice:
    description: Минимальная цена
    $ref: '../../../openapi.yaml#/components/schemas/MinPrice'
  overhead:
    type: object
    description: Дополнительные расходы
    properties:
      value:
        type: number
        format: double
        description: Значение цены
      currency:
        description: Валюта
        $ref: '../../../openapi.yaml#/components/schemas/Currency'
  attributes:
    type: array
    description: Коллекция метаданных доп. полей
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  components:
    description: Массив компонентов Комплекта
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/BundleComponentList'