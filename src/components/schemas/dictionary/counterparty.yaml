type: object
description: Контрагент
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "counterparty"
    - param: "id"
  type: "counterparty"
properties:
  meta:
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID контрагента
    readOnly: true
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование контрагента
  code:
    type: string
    maxLength: 255
    description: Код контрагента
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код контрагента
  archived:
    type: boolean
    description: Добавлен ли контрагент в архив
  created:
    type: string
    #    format: date-time  # API использует формат: YYYY-MM-DD HH:MM:SS.mmm
    description: Момент создания
    readOnly: true
  updated:
    type: string
    #    format: date-time  # API использует формат: YYYY-MM-DD HH:MM:SS.mmm
    description: Момент последнего обновления
    readOnly: true
  description:
    type: string
    maxLength: 4096
    description: Комментарий к контрагенту
  companyType:
    type: string
    description: Тип контрагента. Известные значения описаны в CompanyType
  email:
    type: string
    format: email
    description: Адрес электронной почты
  phone:
    type: string
    description: Номер телефона
  fax:
    type: string
    description: Номер факса
  actualAddress:
    type: string
    maxLength: 255
    description: Фактический адрес контрагента
  actualAddressFull:
    description: Полный адрес
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Address'
  legalAddress:
    type: string
    maxLength: 255
    description: Юридический адрес контрагента
  legalAddressFull:
    description: Полный юридический адрес контрагента
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Address'
  inn:
    type: string
    maxLength: 255
    description: ИНН
  kpp:
    type: string
    maxLength: 255
    description: КПП
  ogrn:
    type: string
    maxLength: 255
    description: ОГРН
  ogrnip:
    type: string
    maxLength: 255
    description: ОГРНИП
  okpo:
    type: string
    maxLength: 255
    description: ОКПО
  certificateNumber:
    type: string
    maxLength: 255
    description: Номер свидетельства
  certificateDate:
    type: string
    #    format: date-time  # API использует формат: YYYY-MM-DD HH:MM:SS.mmm
    description: Дата свидетельства
  legalTitle:
    type: string
    maxLength: 4096
    description: Полное наименование
  legalFirstName:
    type: string
    maxLength: 255
    description: Имя для ИП и физлица
  legalLastName:
    type: string
    maxLength: 255
    description: Фамилия для ИП и физлица
  legalMiddleName:
    type: string
    maxLength: 255
    description: Отчество для ИП и физлица
  birthDate:
    type: string
    #    format: date-time  # API использует формат: YYYY-MM-DD HH:MM:SS.mmm
    description: Дата рождения для физлица
  sex:
    type: string
    description: Пол контрагента. Известные значения описаны в Sex
  discountCardNumber:
    type: string
    maxLength: 255
    nullable: true
    description: Номер дисконтной карты контрагента
  discounts:
    type: array
    nullable: true
    description: Массив скидок контрагента
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AgentDiscount'
  shared:
    type: boolean
    description: Общий доступ
  group:
    description: Метаданные отдела сотрудника
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  owner:
    description: Метаданные владельца (Сотрудника)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  salesAmount:
    type: number
    format: float
    description: Сумма продаж
    readOnly: true
  bonusPoints:
    type: integer
    description: Бонусные баллы по активной бонусной программе
    readOnly: true
  bonusProgram:
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'
  priceType:
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/PriceType'
  state:
    description: Статус Контрагента
    $ref: '../../../openapi.yaml#/components/schemas/State'
  accounts:
    type: object
    description: Массив счетов контрагента
    properties:
      meta:
        $ref: '../common/metaList.yaml'
      rows:
        nullable: true
        type: array
        items:
          $ref: '../../../openapi.yaml#/components/schemas/Account'
  contactpersons:
    type: object
    description: Массив контактных лиц
    properties:
      meta:
        $ref: '../common/metaList.yaml'
      rows:
        type: array
        items:
          $ref: '../../../openapi.yaml#/components/schemas/ContactPerson'
  notes:
    type: object
    description: Массив контактных лиц
    properties:
      meta:
        $ref: '../common/metaList.yaml'
      rows:
        type: array
        items:
          $ref: '../../../openapi.yaml#/components/schemas/Note'
  files:
    description: Метаданные массива Файлов
    $ref: '../../../openapi.yaml#/components/schemas/FileList'
  tags:
    type: array
    description: Группы контрагента
    nullable: true
    items:
      type: string
  attributes:
    type: array
    description: Дополнительные поля
    nullable: true
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'