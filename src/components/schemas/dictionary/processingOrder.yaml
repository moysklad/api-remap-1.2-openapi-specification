type: object
description: Заказ на производство
properties:
  meta:
    description: Метаданные заказа на производство
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID заказа на производство
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование заказа на производство
  code:
    type: string
    maxLength: 255
    description: Код заказа на производство
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код заказа на производство
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий заказа на производство
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления заказа на производство
    readOnly: true
  updated:
    type: string
    description: Момент последнего обновления заказа на производство
    readOnly: true
  moment:
    type: string
    description: Дата документа
