    type: object
    nullable: true
    description: |
      Накладные расходы на уровне документа.
      Если позиции Приемки не заданы, накладные расходы задать нельзя.
    properties:
      sum:
        type: number
        format: double
        description: Сумма в копейках
      distribution:
        type: string
        description: |
          Распределение накладных расходов между позициями.
          Известные значения описаны в SupplyOverheadDistribution
  positions:
    type: object
    description: Позиции Приемки
    $ref: '../../../openapi.yaml#/components/schemas/SupplyPositionList'
  purchaseOrder:
    description: |
      Связанный заказ поставщику (тип `purchaseorder`).
      Полная схема документа — `PurchaseOrder`.
    nullable: true
    type: object
    properties:
      meta:
        description: Метаданные заказа поставщику
        $ref: '../common/meta.yaml'
  factureIn:
    description: Счет-фактура полученный, с которым связана эта Приемка
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FactureIn'
  invoicesIn:
    type: array
    description: Массив ссылок на связанные счета поставщиков
    nullable: true
    items:
      $ref: '../../../openapi.yaml#/components/schemas/InvoiceIn'
  payments:
    type: array
    nullable: true
    description: Массив ссылок на связанные платежи
    items:
      anyOf:
        - $ref: '../../../openapi.yaml#/components/schemas/PaymentOut'
        - $ref: '../../../openapi.yaml#/components/schemas/PaymentIn'
  productionTask:
    description: Связанное производственное задание
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/ProductionTask'
  returns:
    type: array
    description: |
      Массив ссылок на связанные возвраты
    nullable: true
    items:
      anyOf:
        - $ref: '../../../openapi.yaml#/components/schemas/SalesReturn'
        - $ref: '../../../openapi.yaml#/components/schemas/PurchaseReturn'
        - $ref: '../../../openapi.yaml#/components/schemas/PrepaymentReturn'
