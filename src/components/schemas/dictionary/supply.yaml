    maxLength: 255
    description: Код Приемки
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Приемки
  syncId:
    type: string
    format: uuid
    description: ID синхронизации. После заполнения недоступен для изменения
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Приемки
  created:
