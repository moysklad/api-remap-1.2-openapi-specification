type: object
description: Позиция Возврата покупателя
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "salesreturn"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "salesreturnposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации/комплекта, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  cost:
    type: integer
    description: Себестоимость
  country:
    description: Метаданные Страны
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Country'
  discount:
    type: number
    format: double
    description: Процент скидки или наценки
  gtd:
    type: object
    nullable: true
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Gtd'
  pack:
    description: Упаковка Товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: Количество товаров/услуг данного вида в позиции. Если позиция — товар с учётом по серийным номерам, значение всегда равно количеству серийных номеров для этой позиции в документе.
  slot:
    description: Ячейка на складе
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/StoreSlot'
  things:
    type: array
    description: Серийные номера. Игнорируется, если товар позиции не на серийном учёте;
      иначе количество единиц в позиции совпадает с числом переданных серийных номеров.
    items:
      type: string
  vat:
    type: integer
    description: НДС, которым облагается текущая позиция
  vatEnabled:
    type: boolean
    description: Включен ли НДС для позиции
