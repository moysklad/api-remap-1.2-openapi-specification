type: object
description: |
  Накладные расходы на уровне документа.
  Если позиции Оприходования не заданы, накладные расходы задать нельзя.
properties:
  sum:
    type: number
    format: double
    description: Сумма в копейках
  distribution:
    type: string
    description: |
      Распределение накладных расходов между позициями.
      Известные значения описаны в EnterOverheadDistribution
