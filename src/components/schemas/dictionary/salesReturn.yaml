type: object
description: Возврат покупателя
x-polymorphic-parent: EntityWithMeta
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "salesreturn"
    - param: "id"
  type: "salesreturn"
properties:
  meta:
    description: Метаданные Возврата покупателя
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Возврата покупателя
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование Возврата покупателя
  code:
    type: string
    maxLength: 255
    description: Код Возврата покупателя
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Возврата покупателя
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Возврата покупателя
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления Возврата покупателя
    readOnly: true
  updated:
    type: string
    description: Момент последнего обновления Возврата покупателя
    readOnly: true
  moment:
    type: string
    description: Дата документа
  applicable:
    type: boolean
    description: Отметка о проведении
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  shared:
    type: boolean
    description: Общий доступ
  vatEnabled:
    type: boolean
    description: Учитывается ли НДС
  vatIncluded:
    type: boolean
    description: Включен ли НДС в цену
  vatSum:
    type: number
    format: double
    description: Сумма НДС
  sum:
    type: number
    format: double
    description: Сумма Возврата покупателя в копейках
    readOnly: true
  payedSum:
    type: number
    format: double
    description: Сумма исходящих платежей по Возврату покупателя
  organization:
    description: Метаданные юрлица
    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  organizationAccount:
    description: Метаданные счета юрлица
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Account'
  agent:
    description: Метаданные Контрагента или юрлица
    x-agent-reference: true
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Agent'
  agentAccount:
    description: Метаданные счета контрагента
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Account'
  store:
    description: Метаданные склада
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Store'
  state:
    description: Метаданные статуса Возврата покупателя
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  contract:
    description: Метаданные договора
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Contract'
  project:
    description: Метаданные проекта
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Project'
  owner:
    description: Владелец (Сотрудник)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  group:
    description: Отдел сотрудника
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  attributes:
    type: array
    nullable: true
    description: Коллекция метаданных доп. полей
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  files:
    description: Метаданные массива Файлов
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  rate:
    description: |
      Валюта документа. 
      Если значение курса валюты не указано, используется курс из справочника валют.
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/CurrencyRate'
  positions:
    type: object
    description: Позиции Возврата покупателя
    $ref: '../../../openapi.yaml#/components/schemas/SalesReturnPositionList'
  salesChannel:
    description: Метаданные канала продаж
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
  demand:
    description: Отгрузка, по которой произошел возврат
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Demand'
  losses:
    type: array
    nullable: true
    description: Массив ссылок на связанные списания
    items:
      $ref: '../../../openapi.yaml#/components/schemas/Loss'
  payments:
    type: array
    nullable: true
    description: Массив ссылок на связанные платежи
    items:
      anyOf:
        - $ref: '../../../openapi.yaml#/components/schemas/PaymentOut'
        - $ref: '../../../openapi.yaml#/components/schemas/CashOut'
  factureOut:
    description: Счет-фактура выданный, с которым связан этот возврат
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FactureOut'
