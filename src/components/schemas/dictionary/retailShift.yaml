type: object
description: Розничная смена
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "retailshift"
    - param: "id"
  type: "retailshift"
properties:
  meta:
    description: Метаданные Розничной смены
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Розничной смены
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  acquire:
    description: Метаданные Банка-эквайера по операциям по карте
    nullable: true
    type: object
    x-agent-reference: true
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Agent'
  agentAccount:
    description: Метаданные счета контрагента
    nullable: true
    readOnly: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Account'
  attributes:
    type: array
    description: Коллекция метаданных доп. полей
    nullable: true
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  bankComission:
    type: number
    format: double
    description: Сумма комиссии эквайера за проведение безналичных платежей по банковской карте
  bankPercent:
    type: number
    format: double
    minimum: 0
    maximum: 100
    description: Комиссия банка-эквайера по операциям по карте (в процентах)
  cheque:
    type: object
    description: Информация о смене ККТ
    nullable: true
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/RetailShiftCheque'
  closeDate:
    type: string
    nullable: true
    description: Дата закрытия смены
  contract:
    description: Метаданные договора
    nullable: true
    readOnly: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Contract'
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    nullable: true
    description: Момент последнего удаления Розничной смены
    readOnly: true
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Розничной смены
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Розничной смены
  files:
    description: Метаданные массива Файлов
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  group:
    description: Отдел сотрудника
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Group'
  moment:
    type: string
    description: Дата смены
  name:
    type: string
    maxLength: 255
    description: Наименование Розничной смены
  operations:
    type: array
    description: |
      Связанные операции. Допустимые типы по `meta.type`: retaildemand, retailsalesreturn,
      retaildrawercashin, retaildrawercashout, prepayment, prepaymentreturn.
    nullable: true
    readOnly: true
    items:
      $ref: '../../../openapi.yaml#/components/schemas/RetailShiftOperation'
  organization:
    description: Метаданные юрлица
    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  organizationAccount:
    description: Метаданные счета юрлица
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Account'
  owner:
    description: Владелец (Сотрудник)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  paymentOperations:
    type: array
    description: Коллекция метаданных платежных операций
    nullable: true
    readOnly: true
    items:
      $ref: '../../../openapi.yaml#/components/schemas/RetailShiftPaymentOperation'
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  proceedsCash:
    type: number
    format: double
    description: Выручка наличными
    readOnly: true
  proceedsNoCash:
    type: number
    format: double
    description: Выручка безнал
    readOnly: true
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  qrAcquire:
    description: Метаданные Банка-эквайера по операциям по QR-коду
    nullable: true
    type: object
    x-agent-reference: true
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Agent'
  qrBankComission:
    type: number
    format: double
    description: Сумма комиссии эквайера за проведение безналичных платежей по QR-коду
  qrBankPercent:
    type: number
    format: double
    minimum: 0
    maximum: 100
    description: Комиссия банка-эквайера по операция по QR-коду (в процентах)
  receivedCash:
    type: number
    format: double
    description: Получено наличными
    readOnly: true
  receivedNoCash:
    type: number
    format: double
    description: Получено безнал
    readOnly: true
  retailStore:
    description: Метаданные точки продаж
    $ref: '../../../openapi.yaml#/components/schemas/RetailStore'
  shared:
    type: boolean
    description: Общий доступ
  store:
    description: Метаданные склада
    $ref: '../../../openapi.yaml#/components/schemas/Store'
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  updated:
    type: string
    description: Момент последнего обновления Розничной смены
    readOnly: true
  vatEnabled:
    type: boolean
    description: Учитывается ли НДС
    readOnly: true
  vatIncluded:
    type: boolean
    description: Включен ли НДС в цену
