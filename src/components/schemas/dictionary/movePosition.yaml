type: object
description: Позиция Перемещения
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "move"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "moveposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  overhead:
    type: integer
    description: |
      Накладные расходы по позиции.
      Если позиции Перемещения не заданы, накладные расходы на уровне документа задать нельзя.
    readOnly: true
  pack:
    description: Упаковка Товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: |
      Количество товаров/услуг данного вида в позиции.
      Если позиция — товар с учётом по серийным номерам, значение всегда равно количеству серийных номеров для этой позиции в документе.
  sourceSlot:
    description: Ячейка на складе, с которого совершается перемещение
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/StoreSlot'
  targetSlot:
    description: Ячейка на складе, на который совершается перемещение
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/StoreSlot'
  things:
    type: array
    description: |
      Серийные номера. Игнорируется, если товар позиции не на серийном учёте;
      иначе количество единиц в позиции совпадает с числом переданных серийных номеров.
    items:
      type: string
