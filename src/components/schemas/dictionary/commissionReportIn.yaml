type: object
description: Полученный отчет комиссионера (commissionreportin)
properties:
  meta:
    description: Метаданные Полученного отчета комиссионера
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Полученного отчета комиссионера
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  agent:
    description: Метаданные контрагента
    $ref: '../../../openapi.yaml#/components/schemas/Counterparty'
  agentAccount:
    description: Метаданные счета контрагента
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Account'
  applicable:
    type: boolean
    description: Отметка о проведении
  attributes:
    type: array
    description: Коллекция метаданных доп. полей
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  code:
    type: string
    maxLength: 255
    description: Код Полученного отчета комиссионера
  commissionOverhead:
    type: object
    description: Прочие расходы
    properties:
      sum:
        type: number
        format: double
        description: Сумма НДС
  commissionPeriodEnd:
    type: string
    description: Конец периода
  commissionPeriodStart:
    type: string
    description: Начало периода
  commitentSum:
    type: number
    format: double
    description: Сумма коммитента в установленной валюте
    readOnly: true
  contract:
    description: Метаданные договора
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Contract'
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления Полученного отчета комиссионера
    readOnly: true
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Полученного отчета комиссионера
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Полученного отчета комиссионера
  files:
    description: Метаданные массива файлов
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  group:
    description: Отдел сотрудника
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  moment:
    type: string
    description: Дата документа
  name:
    type: string
    maxLength: 255
    description: Наименование Полученного отчета комиссионера
  organization:
    description: Метаданные юрлица
    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  organizationAccount:
    description: Метаданные счета юрлица
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Account'
  owner:
    description: Владелец (Сотрудник)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  payedSum:
    type: number
    format: double
    description: Оплаченная сумма
    readOnly: true
  positions:
    type: object
    description: Метаданные позиций реализовано комиссионером Полученного отчета комиссионера
    $ref: '../../../openapi.yaml#/components/schemas/CommissionReportInPositionList'
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  project:
    description: Метаданные проекта
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Project'
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  rate:
    type: object
    description: Валюта
    properties:
      currency:
        description: Валюта
        $ref: '../../../openapi.yaml#/components/schemas/Currency'
      value:
        type: number
        format: double
        description: Курс валюты
  returnToCommissionerPositions:
    type: object
    description: Метаданные позиций возврата на склад комиссионера Полученного отчета комиссионера
    $ref: '../../../openapi.yaml#/components/schemas/CommissionReportInReturnedPositionList'
  rewardPercent:
    type: integer
    description: Процент вознаграждения
  rewardType:
    type: string
    maxLength: 255
    description: Тип вознаграждения
  salesChannel:
    description: Метаданные канала продаж
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
  shared:
    type: boolean
    description: Общий доступ
  state:
    description: Метаданные статуса Полученного отчета комиссионера
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  sum:
    type: number
    format: double
    description: Сумма Полученного отчета комиссионера в копейках
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
    readOnly: true
  updated:
    type: string
    description: Момент последнего обновления Полученного отчета комиссионера
    readOnly: true
  vatEnabled:
    type: boolean
    description: Учитывается ли НДС
  vatIncluded:
    type: boolean
    description: Включен ли НДС в цену
  vatSum:
    type: number
    format: double
    description: Сумма НДС
  payments:
    type: array
    description: Массив ссылок на связанные платежи
    items:
      anyOf:
        - $ref: '../../../openapi.yaml#/components/schemas/PaymentIn'
        - $ref: '../../../openapi.yaml#/components/schemas/CashIn'

