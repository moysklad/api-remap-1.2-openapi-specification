type: object
description: Права сотрудника
properties:
  isActive:
    type: boolean
    description: Доступ к сервису МойСклад
  login:
    type: string
    maxLength: 255
    description: Логин сотрудника для входа в МойСклад
  email:
    type: string
    format: email
    description: Почта сотрудника
  group:
    type: object
    description: Метаданные Группы, а также ее идентификатор и имя
    properties:
      meta:
        $ref: '../common/meta.yaml'
      id:
        type: string
        format: uuid
        description: ID группы
      name:
        type: string
        description: Название группы
  authorizedHosts:
    type: array
    description: Список ipv4 адресов, с которых разрешен доступ на аккаунт
    items:
      type: string
  authorizedIpNetwork:
    type: string
    description: Ipv4 адрес, идентифицирующий соответствующую подсеть, с правом доступа на аккаунт
  authorizedIpNetmask:
    type: string
    description: Маска подсети с правом доступа на аккаунт
  role:
    $ref: '../../../openapi.yaml#/components/schemas/EmployeeRole'
