type: object
description: Метаданные контрагентов
properties:
  meta:
    $ref: '../common/meta.yaml'
  attributes:
    $ref: '../common/attributeMetaInfoList.yaml'
  states:
    type: array
    description: Массив статусов контрагентов
    items:
      type: object
      properties:
        meta:
          $ref: '../common/meta.yaml'
        id:
          type: string
          format: uuid
          description: ID статуса
        accountId:
          type: string
          format: uuid
          description: ID учетной записи
        name:
          type: string
          description: Наименование статуса
        color:
          type: integer
          description: Цвет статуса
        stateType:
          type: string
          enum: [Regular, Successful, Unsuccessful]
          description: Тип статуса
        entityType:
          type: string
          description: Тип сущности
          example: counterparty
  tags:
    type: array
    description: Тэги контрагентов
    items:
      type: string
  createShared:
    type: boolean
    description: Создавать новых контрагентов с меткой "Общий"
