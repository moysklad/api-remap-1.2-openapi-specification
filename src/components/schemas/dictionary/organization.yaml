type: object
description: Юрлицо
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "organization"
    - param: "id"
  type: "organization"
properties:
  meta:
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID юрлица
    readOnly: true
    example: "12a8b923-692c-11e6-8a84-bae500000056"
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
    example: "12a8b923-692c-11e6-8a84-bae500000053"
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование юрлица
    example: "ООО Поставщик"
