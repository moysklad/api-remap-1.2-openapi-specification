    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  store:
    description: Метаданные склада
    $ref: '../../../openapi.yaml#/components/schemas/Store'
  sum:
    type: number
    format: double
    description: Сумма Розничного возврата в копейках
    readOnly: true
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  taxSystem:
    type: string
    description: Код системы налогообложения. Известные значения описаны в TaxSystem
    example: "GENERAL_TAX_SYSTEM"
  updated:
    type: string
    description: Момент последнего обновления Розничного возврата
    readOnly: true
  vatEnabled:
    type: boolean
    description: Учитывается ли НДС
  vatIncluded:
    type: boolean
    description: Включен ли НДС в цену
  vatSum:
    type: number
    format: double
    description: Сумма НДС
