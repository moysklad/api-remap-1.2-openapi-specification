    format: uuid
    description: ID Перемещения
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  name:
    type: string
    maxLength: 255
    description: Наименование Перемещения
  code:
    type: string
    maxLength: 255
    description: Код Перемещения
  externalCode:
    type: string
    maxLength: 255
