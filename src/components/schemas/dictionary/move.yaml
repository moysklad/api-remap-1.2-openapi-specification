    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/CustomerOrder'
  demand:
    description: Отгрузка, связанная с Перемещением
    readOnly: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Demand'
  supply:
    description: Приемка, связанная с Перемещением
    readOnly: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Supply'
  productionTasks:
    type: array
    description: Связанные производственные задания
    nullable: true
    items:
      $ref: '../../../openapi.yaml#/components/schemas/ProductionTask'
