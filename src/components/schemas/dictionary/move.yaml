    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  sourceStore:
    description: Метаданные склада, с которого совершается перемещение
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Store'
  targetStore:
    description: Метаданные склада, на который совершается перемещение
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Store'
  state:
    description: Метаданные статуса Перемещения
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  project:
