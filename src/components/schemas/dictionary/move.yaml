  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Перемещения
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления Перемещения
    readOnly: true
  updated:
    type: string
    description: Момент последнего обновления Перемещения
    readOnly: true
  moment:
    type: string
    description: Дата документа
  applicable:
    type: boolean
    description: Отметка о проведении
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  shared:
    type: boolean
    description: Общий доступ
  sum:
    type: number
    format: double
    description: Сумма Перемещения в копейках
    readOnly: true
  organization:
