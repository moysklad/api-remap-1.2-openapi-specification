type: object
description: Позиция Розничного возврата
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "retailsalesreturn"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "salesreturnposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации/комплекта, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  cost:
    type: integer
    description: Себестоимость (выводится, если документ был создан без основания)
  discount:
    type: number
    format: double
    description: Процент скидки или наценки. Наценка указывается отрицательным числом, например `-10` задает наценку 10%.
  pack:
    description: Упаковка Товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: Количество товаров/услуг данного вида в позиции. Если позиция - товар с учетом по серийным номерам, значение всегда равно количеству серийных номеров для данной позиции в документе.
  things:
    type: array
    description: Серийные номера. Игнорируется, если товар позиции не находится на серийном учете; иначе количество единиц в позиции совпадает с числом переданных серийных номеров.
    items:
      type: string
  vat:
    type: integer
    description: НДС, которым облагается текущая позиция
    minimum: 0
    maximum: 100
  vatEnabled:
    type: boolean
    description: Включен ли НДС для позиции. Пара `(vat = 0, vatEnabled = false)` соответствует НДС "без НДС"; `(vat = 0, vatEnabled = true)` - НДС 0%.
