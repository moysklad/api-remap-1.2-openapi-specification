type: object
description: Оприходование
x-polymorphic-parent: EntityWithMeta
x-entity-static-builder:
  methodParams:
    - "id"
  href:
    - path: "entity"
    - path: "enter"
    - param: "id"
  type: "enter"
properties:
  meta:
    description: Метаданные Оприходования
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID Оприходования
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  applicable:
    type: boolean
    description: Отметка о проведении
  attributes:
    type: array
    nullable: true
    description: Коллекция метаданных доп. полей
    items:
      $ref: '../../../openapi.yaml#/components/schemas/AttributeAbstract'
  code:
    type: string
    maxLength: 255
    description: Код Оприходования
  created:
    type: string
    description: Дата создания
    readOnly: true
  deleted:
    type: string
    description: Момент последнего удаления Оприходования
    readOnly: true
  description:
    type: string
    maxLength: 4096
    nullable: true
    description: Комментарий Оприходования
  externalCode:
    type: string
    maxLength: 255
    description: Внешний код Оприходования
  files:
    description: Метаданные массива Файлов
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/FileList'
  group:
    description: Отдел сотрудника
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/Group'
  moment:
    type: string
    description: Дата документа
  name:
    type: string
    maxLength: 255
    description: Номер Оприходования
  organization:
    description: Метаданные юрлица
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/Organization'
  overhead:
    description: |
      Накладные расходы на уровне документа.
      Если позиции Оприходования не заданы, накладные расходы задать нельзя.
    $ref: '../common/overhead.yaml'
  owner:
    description: Владелец (Сотрудник)
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Employee'
  positions:
    type: object
    nullable: true
    description: Метаданные позиций Оприходования
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/EnterPositionList'
  printed:
    type: boolean
    description: Напечатан ли документ
    readOnly: true
  project:
    description: Метаданные проекта
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Project'
  published:
    type: boolean
    description: Опубликован ли документ
    readOnly: true
  rate:
    description: |
      Валюта документа. Если значение курса валюты не указано, используется курс из справочника валют.
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/CurrencyRate'
  shared:
    type: boolean
    description: Общий доступ
  state:
    description: Метаданные статуса Оприходования
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/State'
  store:
    description: Метаданные склада
    type: object
    $ref: '../../../openapi.yaml#/components/schemas/Store'
  sum:
    type: number
    format: double
    description: Сумма Оприходования в копейках
    readOnly: true
  syncId:
    type: string
    format: uuid
    description: ID синхронизации
  updated:
    type: string
    description: Момент последнего обновления Оприходования
    readOnly: true
