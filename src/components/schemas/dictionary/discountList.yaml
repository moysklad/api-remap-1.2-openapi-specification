type: object
required:
  - context
  - meta
  - rows
properties:
  context:
    description: Метаданные о сотруднике, выполнившем запрос
    $ref: '../common/context.yaml'
  meta:
    description: Метаданные о выдаче
    $ref: '../common/metaList.yaml'
  rows:
    type: array
    description: |
      Массив скидок всех типов для учётной записи (см. `meta.type`: discount, personaldiscount,
      specialpricediscount, accumulationdiscount, bonusprogram).
    items:
      oneOf:
        - $ref: '../../../openapi.yaml#/components/schemas/Discount'
        - $ref: '../../../openapi.yaml#/components/schemas/PersonalDiscount'
        - $ref: '../../../openapi.yaml#/components/schemas/SpecialPriceDiscount'
        - $ref: '../../../openapi.yaml#/components/schemas/AccumulationDiscount'
        - $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'

