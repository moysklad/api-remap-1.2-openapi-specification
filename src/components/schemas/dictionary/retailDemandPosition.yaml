type: object
description: Позиция Розничной продажи
x-entity-static-builder:
  methodParams:
    - "parentId"
    - "id"
  href:
    - path: "entity"
    - path: "retaildemand"
    - param: "parentId"
    - path: "positions"
    - param: "id"
  type: "demandposition"
properties:
  meta:
    description: Метаданные позиции
    $ref: '../common/meta.yaml'
  id:
    type: string
    format: uuid
    description: ID позиции
    readOnly: true
  accountId:
    type: string
    format: uuid
    description: ID учетной записи
    readOnly: true
  assortment:
    description: Метаданные товара/услуги/партии/модификации, которую представляет собой позиция
    $ref: '../../../openapi.yaml#/components/schemas/Assortment'
  cost:
    type: integer
    description: Себестоимость (только для услуг)
  declaration:
    type: array
    description: |
      Информация о прослеживаемости импортных товаров (ГТД, РНПТ и связанное количество).
      Поле выводится по запросу и доступно только для чтения.
    readOnly: true
    items:
      type: object
      properties:
        gtd:
          type: string
          description: Регистрационный номер партии товара
          readOnly: true
        rnpt:
          type: string
          description: Грузовая таможенная декларация
          readOnly: true
        country:
          description: Страна происхождения товара
          readOnly: true
          nullable: true
          type: object
          allOf:
            - $ref: '../../../openapi.yaml#/components/schemas/Country'
        quantity:
          type: number
          format: double
          description: Количество товара с указанными ГТД или РНПТ в позиции документа
          readOnly: true
  discount:
    type: number
    format: double
    description: Процент скидки или наценки. Наценка указывается отрицательным числом.
  pack:
    description: Упаковка товара
    nullable: true
    type: object
    allOf:
      - $ref: '../../../openapi.yaml#/components/schemas/Pack'
  price:
    type: number
    format: double
    description: Цена товара/услуги в копейках
  quantity:
    type: number
    format: double
    description: Количество товаров/услуг данного вида в позиции
  things:
    type: array
    description: Серийные номера
    items:
      type: string
  vat:
    type: integer
    description: НДС, которым облагается текущая позиция
  vatEnabled:
    type: boolean
    description: Включен ли НДС для позиции
