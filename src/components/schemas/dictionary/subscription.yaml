type: object
description: Подписка компании
properties:
  role:
    type: string
    maxLength: 255
    description: Роль авторизованного пользователя (USER/ADMIN)
    example: "admin"
    readOnly: true
  tariff:
    type: string
    maxLength: 255
    description: Действующий тариф Аккаунта. Известные значения описаны в SubscriptionTariff
    example: "CORPORATE"
    readOnly: true
  isSubscriptionChangeAvailable:
    type: boolean
    description: Доступность изменения подписки
    readOnly: true
  subscriptionEndDate:
    type: integer
    format: int64
    nullable: true
    description: Дата (в миллисекундах) окончания действия текущего тарифа, если тариф отличается от "Пробный" и "Бесплатный"
    example: 1642520241922
    readOnly: true
