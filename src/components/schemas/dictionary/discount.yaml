type: object
description: Скидка (discount)
allOf:
  - $ref: '../../../openapi.yaml#/components/schemas/DiscountBase'
properties:
  allProducts:
    type: boolean
    description: Действует ли скидка на все товары
  assortment:
    type: array
    description: Массив метаданных товаров, услуг и модификаций
    items:
      $ref: '../../../openapi.yaml#/components/schemas/DiscountAssortmentItem'
  productFolders:
    type: array
    description: Массив метаданных Групп товаров
    items:
      $ref: '../../../openapi.yaml#/components/schemas/ProductFolder'
  usePriceType:
    type: boolean
    description: Совместное использование скидок (использовать ли специальную цену)
  discount:
    type: number
    format: float
    nullable: true
    description: Процент скидки, если выбран фиксированный процент
  specialPrice:
    type: object
    nullable: true
    description: Спец. цена (если выбран тип цены)
    properties:
      value:
        type: integer
        format: int32
        description: Значение цены, если выбрано фиксированное значение
      priceType:
        $ref: '../../../openapi.yaml#/components/schemas/PriceType'
  levels:
    type: array
    description: Проценты скидок при определенной сумме продаж
    items:
      type: object
      properties:
        amount:
          type: integer
          format: int32
          description: Сумма накоплений в копейках
        discount:
          type: number
          format: float
          description: Процент скидки, соответствующий данной сумме

