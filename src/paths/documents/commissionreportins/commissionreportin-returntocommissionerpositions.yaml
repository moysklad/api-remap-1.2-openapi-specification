get:
  operationId: getCommissionReportInReturnedPositions
  tags:
    - CommissionReportIns
  summary: Получить позиции возврата на склад комиссионера
  parameters:
    - $ref: ../../../components/parameters.yaml#/entityId
    - $ref: ../../../components/parameters.yaml#/limit
    - $ref: ../../../components/parameters.yaml#/offset
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/CommissionReportInReturnedPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createCommissionReportInReturnedPositions
  tags:
    - CommissionReportIns
  summary: Создать позиции возврата на склад комиссионера
  parameters:
    - $ref: ../../../components/parameters.yaml#/entityId
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - $ref: '../../../openapi.yaml#/components/schemas/CommissionReportInReturnedPosition'
            - type: array
              items:
                $ref: '../../../openapi.yaml#/components/schemas/CommissionReportInReturnedPosition'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: ../../../openapi.yaml#/components/schemas/CommissionReportInReturnedPosition
                - $ref: ../../../openapi.yaml#/components/schemas/Error
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

