post:
  operationId: createPrepaymentReturnMetadataStatesBatch
  tags:
    - PrepaymentReturns
  summary: Массовое создание и обновление статусов Возврата предоплаты
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/State'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/StateRowResult'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
