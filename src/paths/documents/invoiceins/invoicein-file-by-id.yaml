get:
  operationId: getInvoiceInFile
  tags:
    - InvoiceIns
  summary: Получить файл Счета поставщику
  description: Получение Файла Счета поставщику.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: fileId
      in: path
      required: true
      description: ID файла
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/File'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteInvoiceInFile
  tags:
    - InvoiceIns
  summary: Удалить файл Счета поставщику
  description: Удаление Файла Счета поставщику.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: fileId
      in: path
      required: true
      description: ID файла
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Файл успешно удалён
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
