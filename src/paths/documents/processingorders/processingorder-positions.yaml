get:
  operationId: getProcessingOrderPositions
  tags:
  - ProcessingOrders
  summary: Получить позиции ProcessingOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/ProcessingOrderPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createProcessingOrderPositions
  tags:
  - ProcessingOrders
  summary: Создать позиции ProcessingOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
          - $ref: '../../../openapi.yaml#/components/schemas/ProcessingOrderPosition'
          - type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/ProcessingOrderPosition'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/ProcessingOrderPosition'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
