get:
  operationId: getProcessingOrderFile
  tags:
    - ProcessingOrders
  summary: Получить файл Заказа на производство
  description: Получение Файла Заказа на производство.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: fileId
      in: path
      required: true
      description: ID файла
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/File'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteProcessingOrderFile
  tags:
    - ProcessingOrders
  summary: Удалить файл Заказа на производство
  description: Удаление Файла Заказа на производство.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: fileId
      in: path
      required: true
      description: ID файла
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Файл успешно удалён
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
