post:
  operationId: deleteProcessingOrderBatch
  tags:
  - ProcessingOrders
  summary: Массовое удаление ProcessingOrder
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingOrder'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Результат по каждому элементу (успех или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/DeleteRowResult'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
