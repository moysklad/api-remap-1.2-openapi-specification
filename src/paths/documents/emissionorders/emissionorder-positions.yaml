get:
  operationId: getEmissionOrderPositions
  tags:
  - EmissionOrders
  summary: Получить позиции Заказа кодов маркировки
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/parameters.yaml#/fields'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/EmissionOrderPositionList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createEmissionOrderPositions
  tags:
  - EmissionOrders
  summary: Создать позиции Заказа кодов маркировки
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
          - $ref: '../../../openapi.yaml#/components/schemas/EmissionOrderPosition'
          - type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/EmissionOrderPosition'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/EmissionOrderPosition'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
