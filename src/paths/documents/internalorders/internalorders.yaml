get:
  operationId: getInternalOrderList
  tags:
  - InternalOrders
  summary: Получить список InternalOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/search'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/InternalOrderList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createInternalOrder
  tags:
  - InternalOrders
  summary: Создать InternalOrder
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/InternalOrder'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/InternalOrder'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
