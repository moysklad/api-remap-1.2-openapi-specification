get:
  operationId: getInternalOrderPositions
  tags:
  - InternalOrders
  summary: Получить позиции InternalOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/InternalOrderPositionList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createInternalOrderPositions
  tags:
  - InternalOrders
  summary: Создать позицию InternalOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/InternalOrderPosition'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/InternalOrderPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
