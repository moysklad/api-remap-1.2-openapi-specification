get:
  operationId: getCustomerOrderNotes
  tags:
    - CustomerOrders
  summary: Получить список Событий Заказа покупателя
  description: Запрос на получение всех Событий Заказа покупателя для данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/EventNoteList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createCustomerOrderNote
  tags:
    - CustomerOrders
  summary: Добавить Событие Заказа покупателя
  description: Запрос на добавление одного События Заказа покупателя
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/EventNote'
  responses:
    '200':
      description: Событие успешно создано
      content:
        application/json:
          schema:
            oneOf:
              - $ref: '../../../openapi.yaml#/components/schemas/EventNote'
              - type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/EventNote'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
