put:
  operationId: getRetailSalesReturnTemplate
  tags:
    - RetailSalesReturns
  summary: Шаблон Розничного возврата
  description: |
    Предзаполненный шаблон Розничного возврата.
    В теле запроса можно передать `retailShift` для шаблона без основания или `demand` для шаблона на основе Розничной продажи.
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/RetailSalesReturn'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
