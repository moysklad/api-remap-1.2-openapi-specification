put:
  operationId: getInvoiceOutTemplate
  tags:
    - InvoiceOuts
  summary: Шаблон Счета покупателю
  description: |
    Предзаполненный шаблон Счета покупателю. Пустое тело — стандартные значения без привязки к документу;
    в теле можно передать, например, `customerOrder` или `demands` для шаблона на основе документа.
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/InvoiceOut'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
