put:
  operationId: getSupplyTemplate
  tags:
    - Supplies
  summary: Шаблон Приемки
  description: |
    Предзаполненный шаблон Приемки.
    Пустое тело возвращает стандартный шаблон без привязки к документу. В теле можно передать, например, `purchaseOrder`, что позволит получить шаблон на основе заказа поставщику.
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Supply'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
