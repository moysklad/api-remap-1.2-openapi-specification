get:
  operationId: getPurchaseOrderPositions
  tags:
  - PurchaseOrders
  summary: Получить позиции PurchaseOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/parameters.yaml#/fields'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPositionList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createPurchaseOrderPositions
  tags:
  - PurchaseOrders
  summary: Создать позицию PurchaseOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPosition'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
