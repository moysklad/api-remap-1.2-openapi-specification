get:
  operationId: getPurchaseOrderPositions
  tags:
  - PurchaseOrders
  summary: Получить позиции PurchaseOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/parameters.yaml#/fields'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createPurchaseOrderPositions
  tags:
  - PurchaseOrders
  summary: Создать позиции PurchaseOrder
  parameters:
  - $ref: '../../../components/parameters.yaml#/entityId'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
          - $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPosition'
          - type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPosition'
            minItems: 1
            maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/PurchaseOrderPosition'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
