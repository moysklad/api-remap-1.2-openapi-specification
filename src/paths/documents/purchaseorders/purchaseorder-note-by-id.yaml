get:
  operationId: getPurchaseOrderNoteById
  tags:
    - PurchaseOrders
  summary: Получить Событие Заказа поставщику по ID
  description: Запрос на получение одного События Заказа поставщику
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: noteId
      in: path
      required: true
      description: ID События
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/EventNote'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updatePurchaseOrderNote
  tags:
    - PurchaseOrders
  summary: Обновить Событие Заказа поставщику
  description: Запрос на обновление одного События Заказа поставщику
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: noteId
      in: path
      required: true
      description: ID События
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            description:
              type: string
              maxLength: 4096
              description: Текст События
          required:
            - description
  responses:
    '200':
      description: Событие успешно обновлено
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/EventNote'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deletePurchaseOrderNote
  tags:
    - PurchaseOrders
  summary: Удалить Событие Заказа поставщику
  description: Запрос на удаление одного События Заказа поставщику
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - name: noteId
      in: path
      required: true
      description: ID События
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '204':
      description: Событие успешно удалено
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
