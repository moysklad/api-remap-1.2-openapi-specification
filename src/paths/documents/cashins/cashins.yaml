get:
  operationId: getCashInList
  tags:
    - CashIns
  summary: Получить список CashIn
  parameters:
    - $ref: ../../../components/parameters.yaml#/limit
    - $ref: ../../../components/parameters.yaml#/offset
    - $ref: ../../../components/parameters.yaml#/search
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CashInList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createCashIn
  tags:
    - CashIns
  summary: Создать CashIn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/CashIn'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CashIn'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson

