post:
  operationId: createCashInBatch
  tags:
    - CashIns
  summary: Массовое создание и обновление CashIn
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/CashIn'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: ../../../openapi.yaml#/components/schemas/CashIn
                - $ref: ../../../openapi.yaml#/components/schemas/Error
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson

