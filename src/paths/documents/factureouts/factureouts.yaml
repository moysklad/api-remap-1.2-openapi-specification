get:
  operationId: getFactureOuts
  tags:
    - FactureOuts
  summary: Получить список Счетов-фактур выданных
  description: Запрос всех Счетов-фактур выданных на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/FactureOutList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createFactureOut
  tags:
    - FactureOuts
  summary: Создать Счет-фактуру выданный
  description: Создание Счета-фактуры выданного
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/FactureOut'
  responses:
    '200':
      description: Счет-фактура выданный успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/FactureOut'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
