get:
  operationId: getInventoryById
  tags:
    - Inventories
  summary: Получить Инвентаризацию с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Inventory'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateInventory
  tags:
    - Inventories
  summary: Изменить Инвентаризацию
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Inventory'
  responses:
    '200':
      description: Инвентаризация успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Inventory'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteInventory
  tags:
    - Inventories
  summary: Удалить Инвентаризацию
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Инвентаризация успешно удалена
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
