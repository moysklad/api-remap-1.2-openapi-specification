get:
  operationId: getInventoryList
  tags:
    - Inventories
  summary: Получить список Инвентаризаций
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/InventoryList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createInventory
  tags:
    - Inventories
  summary: Создать Инвентаризацию
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Inventory'
  responses:
    '200':
      description: Инвентаризация успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Inventory'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
