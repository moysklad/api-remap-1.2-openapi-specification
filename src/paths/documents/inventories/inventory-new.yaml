put:
  operationId: getInventoryTemplate
  tags:
    - Inventories
  summary: Шаблон Инвентаризации
  description: |
    Предзаполненный шаблон Инвентаризации.
    Пустое тело — стандартные значения без привязки к документу;
    в теле можно передать, например, `customerOrder` или `invoicesOut` для шаблона на основе документа.
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Inventory'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
