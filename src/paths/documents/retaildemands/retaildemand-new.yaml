put:
  operationId: getRetailDemandTemplate
  tags:
    - RetailDemands
  summary: Шаблон Розничной продажи
  description: |
    Предзаполненный шаблон Розничной продажи.
    В теле запроса необходимо передать ссылку на активную розничную смену (`retailShift`).
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/RetailDemand'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
