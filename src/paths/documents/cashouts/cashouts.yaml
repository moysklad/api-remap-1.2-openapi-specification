get:
  operationId: getCashOutList
  tags:
    - CashOuts
  summary: Получить список CashOut
  parameters:
    - $ref: ../../../components/parameters.yaml#/limit
    - $ref: ../../../components/parameters.yaml#/offset
    - $ref: ../../../components/parameters.yaml#/search
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/cashOutList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
post:
  operationId: createCashOut
  tags:
    - CashOuts
  summary: Создать CashOut
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/cashOut.yaml'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/cashOut.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
    - $ref: ../../../components/parameters.yaml#/expand
    - $ref: ../../../components/headers.yaml#/AcceptHeader
    - $ref: ../../../components/headers.yaml#/AcceptEncoding
    - $ref: ../../../components/headers.yaml#/ContentTypeJson

