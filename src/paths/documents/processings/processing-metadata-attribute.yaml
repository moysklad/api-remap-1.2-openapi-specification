get:
  operationId: getProcessingMetadataAttribute
  tags:
    - Processings
  summary: Доп. поля Processing
  parameters:
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfoList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createProcessingMetadataAttribute
  tags:
    - Processings
  summary: Создать Доп. поле Processing
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
