get:
  operationId: getPaymentInFiles
  tags:
    - PaymentIns
  summary: Получить файлы входящего платежа
  description: Запрос на получение списка всех Файлов данного Входящего платежа.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/MetaList'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/File'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: addPaymentInFiles
  tags:
    - PaymentIns
  summary: Добавить файлы к входящему платежу
  description: |
    Добавить новые Файлы к Входящему платежу. В одном запросе можно добавить максимум 10 Файлов.
    В поле `content` нужно указать файл, закодированный в Base64, в поле `filename` — имя файла с расширением.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          maxItems: 10
          items:
            $ref: '../../../openapi.yaml#/components/schemas/FileUpload'
  responses:
    '200':
      description: Файлы успешно добавлены. Результат — массив всех Файлов Входящего платежа.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/File'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
