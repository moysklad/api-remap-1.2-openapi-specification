  tags:
    - FactureIns
  summary: Обновить отдельный статус Счета-фактуры полученного
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
