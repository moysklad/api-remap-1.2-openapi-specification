  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/State'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/State'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteFactureInMetadataStateById
  tags:
    - FactureIns
  summary: Удалить отдельный статус Счета-фактуры полученного
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
    '404':
