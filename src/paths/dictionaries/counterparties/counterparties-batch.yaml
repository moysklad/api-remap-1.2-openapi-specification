post:
  operationId: createCounterpartiesBatch
  tags:
    - Counterparties
  summary: Создать или изменить контрагентов
  description: Создание или изменение нескольких контрагентов.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Counterparty'
          minItems: 1
          maxItems: 1000
        example:
          - name: "ООО Радуга batch"
            companyType: "legal"
            description: "Контрагент batch из примера OpenAPI"
            email: "raduga-batch@stroi.ru"
            phone: "+7 495 162 32 23"
            inn: "1251581244152"
  responses:
    '200':
      description: Контрагенты созданы или изменены (элемент — сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchResponseEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'