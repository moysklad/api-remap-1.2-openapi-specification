get:
  operationId: getCounterpartyNotes
  tags:
    - Counterparties
  summary: Получить события контрагента
  description: Запрос на получение списка всех событий данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/MetaList'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/Note'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createCounterpartyNote
  tags:
    - Counterparties
  summary: Создать событие контрагента
  description: Создание нового события у данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Note'
        example:
          description: "текст"
  responses:
    '200':
      description: Событие успешно создано
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Note'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    
    
    
