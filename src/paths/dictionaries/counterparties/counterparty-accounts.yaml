get:
  operationId: getCounterpartyAccounts
  tags:
    - Counterparties
  summary: Получить счета контрагента
  description: Запрос на получение списка всех счетов данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '../../../components/schemas/common/metaList.yaml'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/Account'
          example:
            meta:
              href: "https://api.moysklad.ru/api/remap/1.2/entity/counterparty/12a8b923-692c-11e6-8a84-bae500000056/accounts"
              type: "account"
              mediaType: "application/json"
              size: 1
              limit: 1000
              offset: 0
            rows:
              - meta:
                  href: "https://api.moysklad.ru/api/remap/1.2/entity/counterparty/12a8b923-692c-11e6-8a84-bae500000056/accounts/40702810-1234-1234-1234-123456789012"
                  type: "account"
                  mediaType: "application/json"
                id: "40702810-1234-1234-1234-123456789012"
                accountId: "f976ed28-2e58-11e6-8a84-bae500000001"
                isDefault: true
                accountNumber: "40702810123456789012"
                bankName: "ПАО Сбербанк"
                bic: "044525225"
                correspondentAccount: "30101810400000000225"
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../../components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'

post:
  operationId: createCounterpartyAccount
  tags:
    - Counterparties
  summary: Создать счёт контрагента
  description: Создание нового счёта у данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Account'
  responses:
    '200':
      description: Счёт успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Account'
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../../components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'
    '413':
      $ref: '../../../components/responses.yaml#/PayloadTooLarge'
    '415':
      $ref: '../../../components/responses.yaml#/UnsupportedMediaType'
