get:
  operationId: getCounterpartyAccounts
  tags:
    - Counterparties
  summary: Получить счета контрагента
  description: Запрос на получение списка всех счетов данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/MetaList'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/Account'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    

post:
  operationId: createCounterpartyAccount
  tags:
    - Counterparties
  summary: Создать счёт контрагента
  description: Создание нового счёта у данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Account'
  responses:
    '200':
      description: Счёт успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Account'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    
    
    
