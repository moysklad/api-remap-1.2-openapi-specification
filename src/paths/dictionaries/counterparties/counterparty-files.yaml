get:
  operationId: getCounterpartyFiles
  tags:
    - Counterparties
  summary: Получить файлы контрагента
  description: Запрос на получение списка всех Файлов данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/MetaList'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/File'
          example:
            meta:
              href: "https://api.moysklad.ru/api/remap/1.2/entity/counterparty/5236f16d-d954-11ef-ac12-000f000000a2/files"
              type: "files"
              mediaType: "application/json"
              size: 1
              limit: 1000
              offset: 0
            rows:
              - meta:
                  href: "https://api.moysklad.ru/api/remap/1.2/entity/counterparty/5236f16d-d954-11ef-ac12-000f000000a2/files/f2728180-6afd-4d37-8a13-f3b48069bbb6"
                  type: "files"
                  mediaType: "application/json"
                  downloadHref: "https://api.moysklad.ru/api/remap/1.2/download/f2728180-6afd-4d37-8a13-f3b48069bbb6"
                title: "doc"
                filename: "doc.pdf"
                size: 25000
                created: "2019-01-25 17:30:25.021"
                createdBy:
                  meta:
                    href: "https://api.moysklad.ru/api/remap/1.2/entity/employee/69f5683e-a49b-11ea-ac15-000e000000cf"
                    metadataHref: "https://api.moysklad.ru/api/remap/1.2/entity/employee/metadata"
                    type: "employee"
                    mediaType: "application/json"
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    

post:
  operationId: addCounterpartyFiles
  tags:
    - Counterparties
  summary: Добавить файлы к контрагенту
  description: |
    Добавить новые Файлы к Контрагенту. В одном запросе можно добавить максимум 10 Файлов.
    В поле `content` нужно указать файл, закодированный в Base64, в поле `filename` — имя файла с расширением.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          maxItems: 10
          items:
            $ref: '../../../openapi.yaml#/components/schemas/FileUpload'
        example:
          - filename: "doc.pdf"
            content: "SGVsbG8gV29ybGQ="
  responses:
    '200':
      description: Файлы успешно добавлены. Результат — массив всех Файлов Контрагента.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/File'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    
    
    
