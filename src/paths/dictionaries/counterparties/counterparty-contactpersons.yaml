get:
  operationId: getCounterpartyContactPersons
  tags:
    - Counterparties
  summary: Получить контактные лица контрагента
  description: Запрос на получение списка всех контактных лиц данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/MetaList'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/ContactPerson'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createCounterpartyContactPerson
  tags:
    - Counterparties
  summary: Создать контактное лицо контрагента
  description: Создание нового контактного лица у данного Контрагента.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ContactPerson'
        example:
          name: "Петр"
  responses:
    '200':
      description: Контактное лицо успешно создано
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ContactPerson'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    
    
    
