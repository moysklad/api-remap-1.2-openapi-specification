get:
  operationId: getExpenseItems
  tags:
    - ExpenseItems
  summary: Получить список статей расходов
  description: Запрос всех статей расходов на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ExpenseItemList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createExpenseItem
  tags:
    - ExpenseItems
  summary: Создать статью расходов
  description: Создание новой статьи расходов
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ExpenseItem'
        example:
          name: "Налоги и не налоги"
  responses:
    '200':
      description: Статья расходов успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ExpenseItem'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
