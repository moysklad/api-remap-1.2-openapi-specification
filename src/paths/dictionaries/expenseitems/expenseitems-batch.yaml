post:
  operationId: createExpenseItemsBatch
  tags:
    - ExpenseItems
  summary: Создать или изменить статьи расходов
  description: Создание или изменение нескольких статей расходов.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/ExpenseItem'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Статьи расходов успешно созданы или изменены
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchResponseEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
