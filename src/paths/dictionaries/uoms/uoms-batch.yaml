post:
  operationId: createUomsBatch
  tags:
    - Uoms
  summary: Создать или изменить единицу измерения
  description: Создание или изменение нескольких единиц измерения.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Uom'
          minItems: 1
          maxItems: 1000
        example:
          - name: "Попугаи"
  responses:
    '200':
      description: Единицы измерения созданы или изменены (элемент — сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchResponseEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    
    
    