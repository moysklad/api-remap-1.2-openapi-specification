get:
  operationId: getWebhookById
  tags:
    - Webhooks
  summary: Получить вебхук по ID
  description: Запрос на получение отдельного вебхука с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Webhook'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateWebhook
  tags:
    - Webhooks
  summary: Изменить вебхук
  description: Изменение сведений о вебхуке (включая отключение через enabled)
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Webhook'
  responses:
    '200':
      description: Вебхук успешно изменен
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Webhook'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteWebhook
  tags:
    - Webhooks
  summary: Удалить вебхук
  description: Удаление вебхука с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Вебхук успешно удален
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
