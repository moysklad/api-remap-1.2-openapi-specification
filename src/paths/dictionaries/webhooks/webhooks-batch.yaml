post:
  operationId: createOrUpdateWebhooksBatch
  tags:
    - Webhooks
  summary: Массовое создание и обновление вебхуков
  description: |
    Массовое создание и обновление вебхуков.
    Обновляемые вебхуки должны содержать идентификатор в виде метаданных.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Webhook'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Вебхуки созданы или изменены (элемент — сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchResponseEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
