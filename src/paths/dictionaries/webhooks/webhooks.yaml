get:
  operationId: getWebhooks
  tags:
    - Webhooks
  summary: Получить список вебхуков
  description: Запрос на получение всех вебхуков на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/WebhookList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createWebhook
  tags:
    - Webhooks
  summary: Создать вебхук
  description: |
    Создание вебхука. Сочетание entityType, action, url должно быть уникальным.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Webhook'
        example:
          url: "http://www.example.com"
          enabled: true
          action: "CREATE"
          entityType: "supply"
  responses:
    '200':
      description: Вебхук успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Webhook'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
