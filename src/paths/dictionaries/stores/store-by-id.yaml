get:
  operationId: getStoreById
  tags:
  - Stores
  summary: Получить Склад
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/store.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
put:
  operationId: updateStore
  tags:
  - Stores
  summary: Изменить Склад
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/store.yaml'
  responses:
    '200':
      description: Склад обновлен
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/store.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
delete:
  operationId: deleteStore
  tags:
  - Stores
  summary: Удалить Склад
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Склад удален
    default:
      $ref: '../../../components/responses.yaml#/Base'
