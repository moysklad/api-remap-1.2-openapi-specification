post:
  operationId: deleteStoreZonesBatch
  tags:
  - Stores
  summary: Массовое удаление зон склада
  parameters:
  - name: storeId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/StoreZone'
  responses:
    '200':
      description: Успешный запрос
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
