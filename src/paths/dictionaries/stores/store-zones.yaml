get:
  operationId: getStoreZones
  tags:
  - Stores
  summary: Получить зоны склада
  parameters:
  - name: storeId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/storeZoneList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
post:
  operationId: createStoreZones
  tags:
  - Stores
  summary: Создать зону склада
  parameters:
  - name: storeId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - $ref: ../../../openapi.yaml#/components/schemas/StoreZone
            - type: array
              items:
                $ref: '../../../openapi.yaml#/components/schemas/StoreZone'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/StoreZone'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
