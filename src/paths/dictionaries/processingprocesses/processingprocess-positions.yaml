get:
  operationId: getProcessingProcessPositions
  tags:
    - ProcessingProcesses
  summary: Получить позиции Техпроцесса
  description: Запрос на получение списка всех позиций данного Техпроцесса
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPositionList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createProcessingProcessPositions
  tags:
    - ProcessingProcesses
  summary: Создать позиции Техпроцесса
  description: Создание позиций Техпроцесса
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
            - $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPosition'
            - type: array
              items:
                $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPosition'
              minItems: 1
              maxItems: 1000
  responses:
    '200':
      description: Позиции Техпроцесса успешно созданы
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPosition'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
