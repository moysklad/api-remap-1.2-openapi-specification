get:
  operationId: getProcessingProcessPositionById
  tags:
    - ProcessingProcesses
  summary: Получить позицию Техпроцесса
  description: Запрос на получение отдельной позиции Техпроцесса с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/positionId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateProcessingProcessPosition
  tags:
    - ProcessingProcesses
  summary: Изменить позицию Техпроцесса
  description: Обновление позиции Техпроцесса с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/positionId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPosition'
  responses:
    '200':
      description: Позиция Техпроцесса успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingProcessPosition'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteProcessingProcessPosition
  tags:
    - ProcessingProcesses
  summary: Удалить позицию Техпроцесса
  description: Удаление позиции Техпроцесса с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/positionId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Позиция Техпроцесса успешно удалена
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
