get:
  operationId: getCountryById
  tags:
    - Countries
  summary: Получить страну по id
  description: Запрос на получение отдельной страны с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/country.yaml'
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'
    '405':
      $ref: '../../../components/responses.yaml#/MethodNotAllowed'
    '415':
      $ref: '../../../components/responses.yaml#/UnsupportedMediaType'

put:
  operationId: updateCountry
  tags:
    - Countries
  summary: Обновить страну
  description: Обновление страны с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/country.yaml'
  responses:
    '200':
      description: Страна успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/country.yaml'
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'
    '405':
      $ref: '../../../components/responses.yaml#/MethodNotAllowed'
    '413':
      $ref: '../../../components/responses.yaml#/PayloadTooLarge'
    '415':
      $ref: '../../../components/responses.yaml#/UnsupportedMediaType'

delete:
  operationId: deleteCountry
  tags:
    - Countries
  summary: Удалить страну
  description: Удаление страны с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Страна успешно удалена
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'
    '405':
      $ref: '../../../components/responses.yaml#/MethodNotAllowed'
    '409':
      $ref: '../../../components/responses.yaml#/Conflict'
    '412':
      $ref: '../../../components/responses.yaml#/PreconditionFailed'
    '415':
      $ref: '../../../components/responses.yaml#/UnsupportedMediaType'