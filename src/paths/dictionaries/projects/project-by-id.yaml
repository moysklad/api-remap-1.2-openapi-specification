get:
  operationId: getProjectById
  tags:
    - Projects
  summary: Получить проект по ID
  description: Запрос на получение отдельного проекта с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Project'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateProject
  tags:
    - Projects
  summary: Обновить проект
  description: Обновление проекта с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Project'
  responses:
    '200':
      description: Проект успешно обновлен
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Project'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteProject
  tags:
    - Projects
  summary: Удалить проект
  description: Удаление проекта с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Проект успешно удален
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
