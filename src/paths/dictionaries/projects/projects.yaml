get:
  operationId: getProjects
  tags:
    - Projects
  summary: Получить список проектов
  description: Запрос всех проектов на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ProjectList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createProject
  tags:
    - Projects
  summary: Создать проект
  description: Создание нового проекта
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Project'
  responses:
    '200':
      description: Проект успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Project'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
