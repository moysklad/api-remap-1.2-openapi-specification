get:
  operationId: getBonusTransactionById
  tags:
    - BonusTransactions
  summary: Получить бонусную операцию по ID
  description: Запрос бонусной операции с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bonusTransaction.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateBonusTransaction
  tags:
    - BonusTransactions
  summary: Изменить бонусную операцию
  description: Запрос на изменение бонусной операции с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/bonusTransaction.yaml'
  responses:
    '200':
      description: Бонусная операция успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bonusTransaction.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteBonusTransaction
  tags:
    - BonusTransactions
  summary: Удалить бонусную операцию
  description: Удаление бонусной операции с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Бонусная операция успешно удалена
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

