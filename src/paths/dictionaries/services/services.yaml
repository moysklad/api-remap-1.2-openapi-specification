get:
  operationId: getServices
  tags:
    - Services
  summary: Получить список товаров
  description: Запрос всех товаров на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/serviceList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
    
    
    
    
    

post:
  operationId: createService
  tags:
    - Services
  summary: Создать услугу
  description: Создание новой услуги
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/service.yaml'
  responses:
    '200':
      description: Услуга успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/service.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
    
    
    
    
    
    