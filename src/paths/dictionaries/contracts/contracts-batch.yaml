post:
  operationId: createContractsBatch
  tags:
    - Contracts
  summary: Создать или изменить договоры
  description: Создание или изменение нескольких договоров.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Contract'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Договоры успешно созданы или изменены
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
