get:
  operationId: getContractMetadataAttributes
  tags:
    - Contracts
  summary: Получить доп. поля договоров
  description: Запрос на получение всех доп. полей для договоров
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfoList'
    default:
      $ref: '../../../components/responses.yaml#/Base'

post:
  operationId: createContractMetadataAttribute
  tags:
    - Contracts
  summary: Создать доп. поле договора
  description: Создание нового доп. поля для договоров
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
  responses:
    '200':
      description: Доп. поле успешно создано
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/Base'
