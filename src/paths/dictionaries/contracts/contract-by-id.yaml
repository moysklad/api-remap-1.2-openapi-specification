get:
  operationId: getContractById
  tags:
    - Contracts
  summary: Получить договор по ID
  description: Запрос на получение договора с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Contract'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateContract
  tags:
    - Contracts
  summary: Обновить договор
  description: Обновление договора с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Contract'
  responses:
    '200':
      description: Договор успешно обновлен
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Contract'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteContract
  tags:
    - Contracts
  summary: Удалить договор
  description: Удаление договора с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Договор успешно удален
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
