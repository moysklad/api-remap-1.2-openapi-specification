get:
  operationId: getContracts
  tags:
    - Contracts
  summary: Получить список договоров
  description: Запрос всех договоров на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/contractList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'

post:
  operationId: createContract
  tags:
    - Contracts
  summary: Создать договор
  description: Создание нового договора
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/contract.yaml'
  responses:
    '200':
      description: Договор успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/contract.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
