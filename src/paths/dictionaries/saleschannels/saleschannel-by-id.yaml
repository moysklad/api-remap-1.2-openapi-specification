get:
  operationId: getSalesChannelById
  tags:
    - SalesChannels
  summary: Получить Канал продаж по ID
  description: Запрос на получение отдельного Канала продаж с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateSalesChannel
  tags:
    - SalesChannels
  summary: Обновить Канал продаж
  description: Обновление Канала продаж с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
  responses:
    '200':
      description: Канал продаж успешно обновлен
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteSalesChannel
  tags:
    - SalesChannels
  summary: Удалить Канал продаж
  description: Удаление Канала продаж с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Канал продаж успешно удален
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
