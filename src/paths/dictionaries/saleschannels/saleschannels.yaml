get:
  operationId: getSalesChannels
  tags:
    - SalesChannels
  summary: Получить Каналы продаж
  description: Запрос на получение списка всех каналов продаж на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/SalesChannelList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createSalesChannel
  tags:
    - SalesChannels
  summary: Создать Канал продаж
  description: Создание нового Канала продаж
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
        example:
          name: "Телефонный звонок"
          type: "OTHER"
          code: "phone-call"
          description: "Заказы по телефону"
          shared: true
          archived: false
  responses:
    '200':
      description: Канал продаж успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/SalesChannel'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
