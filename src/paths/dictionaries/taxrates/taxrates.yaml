get:
  operationId: getTaxRates
  tags:
    - TaxRates
  summary: Получить список ставок НДС
  description: Запрос всех ставок НДС на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/TaxRateList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createTaxRate
  tags:
    - TaxRates
  summary: Создать ставку НДС
  description: Создание новой ставки НДС
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/TaxRate'
  responses:
    '200':
      description: Ставка НДС успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/TaxRate'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
