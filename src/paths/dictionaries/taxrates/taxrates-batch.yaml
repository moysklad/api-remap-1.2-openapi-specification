post:
  operationId: createTaxRatesBatch
  tags:
    - TaxRates
  summary: Создать или изменить ставки НДС
  description: Создание или изменение нескольких ставок НДС.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/TaxRate'
          minItems: 1
          maxItems: 1000
        example:
          - rate: 34.0
            comment: "Ставка НДС batch из примера OpenAPI"
            shared: false
            archived: false
            externalCode: "taxRate123"
  responses:
    '200':
      description: Ставки НДС успешно созданы или изменены
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchResponseEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
