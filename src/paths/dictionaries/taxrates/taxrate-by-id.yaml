get:
  operationId: getTaxRateById
  tags:
    - TaxRates
  summary: Получить ставку НДС по ID
  description: Запрос на получение отдельной ставки НДС с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/TaxRate'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateTaxRate
  tags:
    - TaxRates
  summary: Обновить ставку НДС
  description: Обновление ставки НДС с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/TaxRate'
  responses:
    '200':
      description: Ставка НДС успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/TaxRate'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteTaxRate
  tags:
    - TaxRates
  summary: Удалить ставку НДС
  description: Удаление ставки НДС с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Ставка НДС успешно удалена
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
