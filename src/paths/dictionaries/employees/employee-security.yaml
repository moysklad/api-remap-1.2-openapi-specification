get:
  operationId: getEmployeeSecurity
  tags:
    - Employees
  summary: Получить права сотрудника
  description: Запрос на получение информации о правах Сотрудника. Получать права может только сотрудник с правами Системный администратор.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/EmployeeSecurity'
          example:
            isActive: true
            login: "example@lognex"
            email: "example@example.ru"
            group:
              meta:
                href: "https://api.moysklad.ru/api/remap/1.2/entity/group/f4b74c5e-443a-11eb-ac12-001000000002"
                metadataHref: "https://api.moysklad.ru/api/remap/1.2/entity/group/metadata"
                type: "group"
                mediaType: "application/json"
              id: "f4b74c5e-443a-11eb-ac12-001000000002"
              name: "Основной"
            authorizedHosts:
              - "1.15.15.5"
            authorizedIpNetwork: "80.8.8.8"
            authorizedIpNetmask: "1.8.8.8"
            role:
              meta:
                href: "https://api.moysklad.ru/api/remap/1.2/entity/role/individual"
                type: "individualrole"
                mediaType: "application/json"
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../../components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'

put:
  operationId: updateEmployeeSecurity
  tags:
    - Employees
  summary: Изменить права сотрудника
  description: Запрос на изменение информации о правах Сотрудника. Изменять права может только сотрудник с правами Системный администратор.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/EmployeeSecurity'
        example:
          group:
            meta:
              href: "https://api.moysklad.ru/api/remap/1.2/entity/group/f4b74c5e-443a-11eb-ac12-001000000003"
              metadataHref: "https://api.moysklad.ru/api/remap/1.2/entity/group/metadata"
              type: "group"
              mediaType: "application/json"
          authorizedHosts:
            - "20.20.15.5"
          role:
            meta:
              href: "https://api.moysklad.ru/api/remap/1.2/entity/role/admin"
              type: "systemrole"
              mediaType: "application/json"
  responses:
    '200':
      description: Права успешно обновлены
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/EmployeeSecurity'
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../../components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'
    '413':
      $ref: '../../../components/responses.yaml#/PayloadTooLarge'
    '415':
      $ref: '../../../components/responses.yaml#/UnsupportedMediaType'
