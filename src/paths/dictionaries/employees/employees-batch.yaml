post:
  operationId: createEmployeesBatch
  tags:
    - Employees
  summary: Создать или изменить сотрудников
  description: Создание или изменение нескольких сотрудников.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Employee'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Сотрудники созданы или изменены (элемент — сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/Employee'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
            minItems: 1
            maxItems: 1000
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
    
    
    
    
    