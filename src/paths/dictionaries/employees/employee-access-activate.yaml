put:
  operationId: activateEmployee
  tags:
    - Employees
  summary: Активировать сотрудника
  description: |
    Запрос на активацию Сотрудника в сервисе МойСклад.
    Если пользователь ранее не был активным, необходимо указать поле `login`.
    Успешным результатом будет json с полем `mailActivationRequired`: если `true` — на почту сотрудника выслано письмо со ссылкой для входа.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: false
    content:
      application/json:
        schema:
          type: object
          properties:
            login:
              type: string
              maxLength: 255
              description: Логин сотрудника (обязателен при первой активации)
            group:
              type: object
              description: Метаданные группы
              properties:
                meta:
                  $ref: '../../../openapi.yaml#/components/schemas/Meta'
            role:
              $ref: '../../../openapi.yaml#/components/schemas/EmployeeRole'
  responses:
    '200':
      description: Сотрудник успешно активирован
      content:
        application/json:
          schema:
            type: object
            properties:
              mailActivationRequired:
                type: boolean
                description: Признак того, что на почту сотрудника выслано письмо для активации
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
