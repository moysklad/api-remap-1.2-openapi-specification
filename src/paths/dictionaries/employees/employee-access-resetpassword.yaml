put:
  operationId: resetEmployeePassword
  tags:
    - Employees
  summary: Сбросить пароль сотрудника
  description: Запрос на сброс пароля Сотрудника в сервисе МойСклад. Новый пароль будет выслан на почту, указанную у данного сотрудника.
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '204':
      description: Пароль успешно сброшен
    '400':
      $ref: '../../../components/responses.yaml#/BadRequest'
    '401':
      $ref: '../../../components/responses.yaml#/Unauthorized'
    '403':
      $ref: '../../../components/responses.yaml#/Forbidden'
    '404':
      $ref: '../../../components/responses.yaml#/NotFound'
