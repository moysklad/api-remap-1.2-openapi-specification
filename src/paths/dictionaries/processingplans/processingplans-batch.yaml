post:
  operationId: createProcessingPlanBatch
  tags:
    - ProcessingPlans
  summary: Создать или изменить Техкарты
  description: Создать или изменить Техкарты.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingPlan'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Техкарты созданы или изменены (элемент - сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/ProcessingPlan'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
            minItems: 1
            maxItems: 1000
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
