post:
  operationId: deleteTaskNotesBatch
  tags:
    - Tasks
  summary: Удалить комментарии к Задаче
  description: Массовое удаление комментариев к Задаче по их мета-объектам
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/TaskNote'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Комментарии к Задаче успешно удалены
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
