get:
  operationId: getCompanySettings
  tags:
    - CompanySettings
  summary: Получить настройки компании
  description: Запрос на получение настроек компании
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CompanySettings'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateCompanySettings
  tags:
    - CompanySettings
  summary: Изменить настройки компании
  description: Запрос на изменение настроек компании
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/CompanySettings'
  responses:
    '200':
      description: Настройки компании успешно обновлены
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CompanySettings'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

