  responses:
    '200':
      description: Персональная скидка успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/PersonalDiscount'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

