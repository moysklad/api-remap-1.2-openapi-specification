post:
  operationId: createOrUpdateWebhookStocksBatch
  tags:
    - WebhookStocks
  summary: Массово создать/обновить вебхуки на изменение остатков
  description: |
    Массовое создание и обновление (массив в теле).
    Сочетание stockType, reportType, url должно быть уникальным.
    Обновляемые записи должны содержать идентификатор в виде метаданных.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          description: Массив JSON-представлений для создания и обновления
          items:
            $ref: '../../../openapi.yaml#/components/schemas/WebhookStock'
          minItems: 1
          maxItems: 1000
        example:
          - url: "http://www.example.com"
            enabled: true
            stockType: "stock"
            reportType: "bystore"
  responses:
    '200':
      description: Один созданный вебхук или массив созданных/изменённых (элемент — сущность или ошибка)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchResponseEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
