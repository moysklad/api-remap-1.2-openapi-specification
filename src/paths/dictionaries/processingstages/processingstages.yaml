get:
  operationId: getProcessingStages
  tags:
    - ProcessingStages
  summary: Получить список Этапов производства
  description: Запрос всех Этапов производства на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingStageList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createProcessingStage
  tags:
    - ProcessingStages
  summary: Создать Этап производства
  description: Создание нового Этапа производства
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/ProcessingStage'
        example:
          name: "Этап 1 из примера OpenAPI"
          description: "Этап производства из примера OpenAPI"
          shared: true
          archived: false
          externalCode: "processingStage123"
          allPerformers: true
          distributionRequired: false
          performers: []
          standardHourCost: 100.0
  responses:
    '200':
      description: Этап производства успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingStage'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
