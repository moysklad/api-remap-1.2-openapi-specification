post:
  operationId: createProcessingStagesBatch
  tags:
    - ProcessingStages
  summary: Создать или изменить Этапы производства
  description: Создание или изменение нескольких Этапов производства.
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/ProcessingStage'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Этапы производства созданы или изменены (элемент - сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
