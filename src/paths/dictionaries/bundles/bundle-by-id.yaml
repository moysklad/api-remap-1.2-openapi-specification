get:
  operationId: getBundleById
  tags:
  - Bundles
  summary: Получить Комплект
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bundle.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
put:
  operationId: updateBundle
  tags:
  - Bundles
  summary: Изменить Комплект
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/bundle.yaml'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bundle.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
delete:
  operationId: deleteBundle
  tags:
  - Bundles
  summary: Удалить Комплект
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
