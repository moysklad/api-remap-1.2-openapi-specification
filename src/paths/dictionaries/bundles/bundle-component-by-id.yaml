get:
  operationId: getBundleComponentById
  tags:
  - Bundles
  summary: Получить компонент
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/parameters.yaml#/expand
  - name: componentId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bundleComponent.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
put:
  operationId: updateBundleComponent
  tags:
  - Bundles
  summary: Изменить компонент
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/parameters.yaml#/expand
  - name: componentId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/bundleComponent.yaml'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bundleComponent.yaml'
    default:
      $ref: '../../../components/responses.yaml#/Base'
delete:
  operationId: deleteBundleComponent
  tags:
  - Bundles
  summary: Удалить компонент
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - name: componentId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
    default:
      $ref: '../../../components/responses.yaml#/Base'
