get:
  operationId: getBundleComponents
  tags:
  - Bundles
  summary: Получить компоненты Комплекта
  parameters:
  - $ref: ../../../components/parameters.yaml#/limit
  - $ref: ../../../components/parameters.yaml#/offset
  - $ref: ../../../components/parameters.yaml#/search
  - $ref: ../../../components/parameters.yaml#/filter
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/parameters.yaml#/order
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bundleComponentList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
post:
  operationId: createBundleComponents
  tags:
  - Bundles
  summary: Добавить компонент Комплекта
  parameters:
  - $ref: ../../../components/parameters.yaml#/entityId
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
  requestBody:
    required: true
    content:
      application/json:
        schema:
          oneOf:
          - $ref: ../../../openapi.yaml#/components/schemas/BundleComponent
          - type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BundleComponent'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BundleComponent'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
