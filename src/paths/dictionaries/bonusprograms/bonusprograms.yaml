get:
  operationId: getBonusPrograms
  tags:
    - BonusPrograms
  summary: Получить список бонусных программ
  description: Запрос всех бонусных программ на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bonusProgramList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createBonusProgram
  tags:
    - BonusPrograms
  summary: Создать бонусную программу
  description: Создание новой бонусной программы
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/bonusProgram.yaml'
  responses:
    '200':
      description: Бонусная программа успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/bonusProgram.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

