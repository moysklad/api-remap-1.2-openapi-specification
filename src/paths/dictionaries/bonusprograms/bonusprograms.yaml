get:
  operationId: getBonusPrograms
  tags:
    - BonusPrograms
  summary: Получить список бонусных программ
  description: Запрос всех бонусных программ на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/BonusProgramList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createBonusProgram
  tags:
    - BonusPrograms
  summary: Создать бонусную программу
  description: Создание новой бонусной программы
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'
        example:
          name: bonusprogram
          active: true
          allProducts: true
          allAgents: false
          agentTags:
            - tag1
            - tag2
          earnRateRoublesToPoint: 7
          spendRatePointsToRouble: 4
          maxPaidRatePercents: 50
          postponedBonusesDelayDays: 7
          earnWhileRedeeming: false
  responses:
    '200':
      description: Бонусная программа успешно создана
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'
          example:
            meta:
              href: https://api.moysklad.ru/api/remap/1.2/entity/bonusprogram/87c69fae-c1ad-4700-a852-f21939470760
              metadataHref: https://api.moysklad.ru/api/remap/1.2/entity/bonusprogram/metadata
              type: bonusprogram
              mediaType: application/json
              uuidHref: https://online.moysklad.ru/app/#discount/edit?id=1223d051-ba76-11e8-3353-995e0000005a
            id: 87c69fae-c1ad-4700-a852-f21939470760
            accountId: dbb8cfc1-cbfa-11e1-6dfb-889ffa6f49fd
            name: bonusprogram
            active: false
            agentTags:
              - tag1
              - tag2
            earnRateRoublesToPoint: 7
            spendRatePointsToRouble: 4
            maxPaidRatePercents: 50
            welcomeBonusesEnabled: false
            postponedBonusesDelayDays: 7
            earnWhileRedeeming: false
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
