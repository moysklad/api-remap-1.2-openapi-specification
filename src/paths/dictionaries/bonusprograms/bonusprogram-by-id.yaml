get:
  operationId: getBonusProgramById
  tags:
    - BonusPrograms
  summary: Получить бонусную программу по ID
  description: Запрос бонусной программы с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateBonusProgram
  tags:
    - BonusPrograms
  summary: Изменить бонусную программу
  description: Запрос на изменение бонусной программы с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'
  responses:
    '200':
      description: Бонусная программа успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/BonusProgram'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteBonusProgram
  tags:
    - BonusPrograms
  summary: Удалить бонусную программу
  description: Удаление бонусной программы с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Бонусная программа успешно удалена
