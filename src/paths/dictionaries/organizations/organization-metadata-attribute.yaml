get:
  operationId: getOrganizationMetadataAttributes
  tags:
    - Organizations
  summary: Получить доп. поля юрлиц
  description: Запрос на получение всех доп. полей для юрлиц
  parameters:
  - $ref: '../../../components/parameters.yaml#/offset'
  - $ref: '../../../components/parameters.yaml#/limit'
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfoList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createOrganizationMetadataAttribute
  tags:
    - Organizations
  summary: Создать доп. поле юрлица
  description: Создание нового доп. поля для юрлиц
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
  responses:
    '200':
      description: Доп. поле успешно создано
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
