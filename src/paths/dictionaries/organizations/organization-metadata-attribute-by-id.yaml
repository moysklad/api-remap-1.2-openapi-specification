delete:
  operationId: deleteOrganizationMetadataAttributeById
  tags:
    - Organizations
  summary: Удалить отдельное доп. поле юрлица
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
