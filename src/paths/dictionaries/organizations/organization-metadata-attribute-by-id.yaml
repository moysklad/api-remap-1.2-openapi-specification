get:
  operationId: getOrganizationMetadataAttributeById
  tags:
    - Organizations
  summary: Получить доп. поле юрлица по ID
  description: Запрос на получение информации по отдельному дополнительному полю
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
