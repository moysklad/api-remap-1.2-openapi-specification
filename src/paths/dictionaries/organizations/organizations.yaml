get:
  operationId: getOrganizations
  tags:
    - Organizations
  summary: Получить список юрлиц
  description: Запрос на получение списка юрлиц на данной учетной записи
  parameters:
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/parameters.yaml#/search'
    - $ref: '../../../components/parameters.yaml#/filter'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/parameters.yaml#/order'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/OrganizationList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createOrganization
  tags:
    - Organizations
  summary: Создать юрлицо
  description: Создание нового юрлица
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Organization'
  responses:
    '200':
      description: Юрлицо успешно создано
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Organization'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
