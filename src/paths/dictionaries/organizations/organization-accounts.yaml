get:
  operationId: getOrganizationAccounts
  tags:
    - Organizations
  summary: Получить счета юрлица
  description: Запрос на получение списка счетов юрлица
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/limit'
    - $ref: '../../../components/parameters.yaml#/offset'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: object
            properties:
              context:
                $ref: '../../../openapi.yaml#/components/schemas/Context'
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/MetaList'
              rows:
                type: array
                items:
                  $ref: '../../../openapi.yaml#/components/schemas/Account'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: updateOrganizationAccounts
  tags:
    - Organizations
  summary: Изменить счета юрлица
  description: Создание нового счёта у данного юрлица
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Account'
  responses:
    '200':
      description: Счета успешно изменены
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Account'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
