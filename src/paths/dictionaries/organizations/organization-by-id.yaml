get:
  operationId: getOrganizationById
  tags:
    - Organizations
  summary: Получить юрлицо по ID
  description: Запрос на получение юрлица с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Organization'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateOrganization
  tags:
    - Organizations
  summary: Обновить юрлицо
  description: Обновление юрлица с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Organization'
  responses:
    '200':
      description: Юрлицо успешно обновлено
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Organization'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteOrganization
  tags:
    - Organizations
  summary: Удалить юрлицо
  description: Удаление юрлица с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Юрлицо успешно удалено
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
