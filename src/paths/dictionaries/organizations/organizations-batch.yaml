post:
  operationId: createOrganizationsBatch
  tags:
    - Organizations
  summary: Создать или изменить юрлица
  description: Массовое создание и обновление юрлиц
  parameters:
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Organization'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Юрлица созданы или изменены (элемент — сущность или объект ошибки)
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: '../../../openapi.yaml#/components/schemas/BatchEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
