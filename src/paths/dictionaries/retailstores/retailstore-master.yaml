get:
  operationId: getMasterRetailStores
  tags:
  - RetailStores
  summary: Получить мастер точки продаж
  parameters:
  - name: retailStoreId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/parameters.yaml#/limit
  - $ref: ../../../components/parameters.yaml#/offset
  - $ref: ../../../components/parameters.yaml#/search
  - $ref: ../../../components/parameters.yaml#/filter
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/parameters.yaml#/order
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/retailStoreList.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: addMasterRetailStore
  tags:
  - RetailStores
  summary: Добавить мастер точку продаж
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../components/schemas/dictionary/retailStore.yaml'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../components/schemas/dictionary/retailStore.yaml'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
  - name: retailStoreId
    in: path
    required: true
    schema:
      type: string
      format: uuid
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
