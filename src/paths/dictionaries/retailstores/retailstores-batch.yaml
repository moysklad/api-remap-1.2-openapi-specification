post:
  operationId: createRetailStoresBatch
  tags:
  - RetailStores
  summary: Массовое создание и обновление точек продаж
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/RetailStore'
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/RetailStore'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/parameters.yaml#/expand'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
