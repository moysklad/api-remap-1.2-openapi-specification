post:
  operationId: deleteVariantsBatch
  tags:
  - Variants
  summary: Массовое удаление Модификаций
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            type: object
            required:
              - meta
            properties:
              meta:
                $ref: '../../../openapi.yaml#/components/schemas/Meta'
          minItems: 1
          maxItems: 1000
        example:
          - meta:
              href: "https://api.moysklad.ru/api/remap/1.2/entity/variant/7944ef04-f831-11e5-7a69-971500188b1"
              metadataHref: "https://api.moysklad.ru/api/remap/1.2/entity/variant/metadata"
              type: "variant"
              mediaType: "application/json"
          - meta:
              href: "https://api.moysklad.ru/api/remap/1.2/entity/variant/7944ef04-f831-11e5-7a69-971500188b2"
              metadataHref: "https://api.moysklad.ru/api/remap/1.2/entity/variant/metadata"
              type: "variant"
              mediaType: "application/json"
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: '../../../openapi.yaml#/components/schemas/DeleteInfo'
                - $ref: '../../../openapi.yaml#/components/schemas/Error'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
  - $ref: '../../../components/headers.yaml#/AcceptHeader'
  - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  - $ref: '../../../components/headers.yaml#/ContentTypeJson'
