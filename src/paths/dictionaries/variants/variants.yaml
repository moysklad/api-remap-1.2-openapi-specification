get:
  operationId: getVariants
  tags:
  - Variants
  summary: Получить список Модификаций
  parameters:
  - $ref: ../../../components/parameters.yaml#/limit
  - $ref: ../../../components/parameters.yaml#/offset
  - $ref: ../../../components/parameters.yaml#/search
  - $ref: ../../../components/parameters.yaml#/filter
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/parameters.yaml#/fields
  - $ref: ../../../components/parameters.yaml#/order
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/VariantList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createVariant
  tags:
  - Variants
  summary: Создать Модификацию
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Variant'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Variant'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
  parameters:
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
