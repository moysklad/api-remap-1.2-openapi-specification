post:
  operationId: createVariantsBatch
  tags:
  - Variants
  summary: Массовое создание и обновление Модификаций
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: '../../../openapi.yaml#/components/schemas/Variant'#/components/schemas/Variant
          minItems: 1
          maxItems: 1000
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
                - $ref: ../../../openapi.yaml#/components/schemas/Variant
                - $ref: ../../../components/schemas/common/error.yaml
    default:
      $ref: '../../../components/responses.yaml#/Base'
  parameters:
  - $ref: ../../../components/headers.yaml#/AcceptHeader
  - $ref: ../../../components/headers.yaml#/AcceptEncoding
  - $ref: ../../../components/parameters.yaml#/expand
  - $ref: ../../../components/headers.yaml#/ContentTypeJson
