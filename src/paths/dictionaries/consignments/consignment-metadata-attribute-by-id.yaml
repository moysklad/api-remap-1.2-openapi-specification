get:
  operationId: getConsignmentMetadataAttributeById
  tags:
    - Consignments
  summary: Получить доп. поле партии по ID
  description: Запрос на получение отдельного доп. поля
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateConsignmentMetadataAttribute
  tags:
    - Consignments
  summary: Обновить доп. поле партии
  description: Обновление доп. поля для партий
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
  responses:
    '200':
      description: Доп. поле успешно обновлено
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteConsignmentMetadataAttribute
  tags:
    - Consignments
  summary: Удалить доп. поле партии
  description: Удаление доп. поля
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Доп. поле успешно удалено
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
