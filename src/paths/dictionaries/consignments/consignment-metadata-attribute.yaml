get:
  operationId: getConsignmentMetadataAttributes
  tags:
    - Consignments
  summary: Получить доп. поля партий
  description: Запрос на получение всех доп. полей для партий
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfoList'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

post:
  operationId: createConsignmentMetadataAttribute
  tags:
    - Consignments
  summary: Создать доп. поле партии
  description: Создание нового доп. поля для партий
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
  responses:
    '200':
      description: Доп. поле успешно создано
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/AttributeMetaInfo'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
