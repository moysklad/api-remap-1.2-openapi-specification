get:
  operationId: getConsignmentById
  tags:
    - Consignments
  summary: Получить партию по ID
  description: Запрос на получение Партии с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Consignment'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
  operationId: updateConsignment
  tags:
    - Consignments
  summary: Обновить партию
  description: Обновление Партии с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/parameters.yaml#/expand'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/Consignment'
  responses:
    '200':
      description: Партия успешно обновлена
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/Consignment'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

delete:
  operationId: deleteConsignment
  tags:
    - Consignments
  summary: Удалить партию
  description: Удаление Партии с указанным id
  parameters:
    - $ref: '../../../components/parameters.yaml#/entityId'
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Партия успешно удалена
    default:
      $ref: '../../../components/responses.yaml#/CommonError'
