post:
  operationId: createCustomEntity
  tags:
    - CustomEntities
  summary: Создать пользовательский справочник
  description: Создание нового пользовательского справочника
  parameters:
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/CustomEntity'
  responses:
    '200':
      description: Пользовательский справочник успешно создан
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CustomEntity'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

