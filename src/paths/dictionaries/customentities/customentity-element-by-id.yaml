get:
  operationId: getCustomEntityElementById
  tags:
    - CustomEntities
  summary: Получить элемент пользовательского справочника
  description: Получить элемент пользовательского справочника с указанным id
  parameters:
    - name: metadataId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
  responses:
    '200':
      description: Успешный запрос
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CustomEntityElement'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

put:
