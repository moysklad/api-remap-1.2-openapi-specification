  parameters:
    - name: metadataId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - $ref: '../../../components/headers.yaml#/AcceptHeader'
    - $ref: '../../../components/headers.yaml#/AcceptEncoding'
    - $ref: '../../../components/headers.yaml#/ContentTypeJson'
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: '../../../openapi.yaml#/components/schemas/CustomEntityElement'
  responses:
    '200':
      description: Элемент пользовательского справочника успешно обновлен
      content:
        application/json:
          schema:
            $ref: '../../../openapi.yaml#/components/schemas/CustomEntityElement'
    default:
      $ref: '../../../components/responses.yaml#/CommonError'

