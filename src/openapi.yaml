components:
  schemas:
    Account:
      $ref: './components/schemas/dictionary/account.yaml'
    AccumulationDiscount:
      $ref: './components/schemas/dictionary/accumulationDiscount.yaml'
    Address:
      $ref: './components/schemas/dictionary/address.yaml'
    AgentDiscount:
      $ref: './components/schemas/dictionary/agentDiscount.yaml'
    Application:
      $ref: './components/schemas/dictionary/application.yaml'
    Assortment:
      $ref: './components/schemas/common/assortment.yaml'
    AssortmentList:
      $ref: './components/schemas/dictionary/assortmentList.yaml'
    AssortmentWithoutBundle:
      $ref: './components/schemas/common/assortmentWithoutBundle.yaml'
    AssortmentSettings:
      $ref: './components/schemas/dictionary/assortmentSettings.yaml'
    AttributeAbstract:
      type: object
      required:
        - type
      discriminator:
        propertyName: type
        mapping:
          file: '#/components/schemas/AttributeFile'
          string: '#/components/schemas/AttributeString'
          text: '#/components/schemas/AttributeText'
          link: '#/components/schemas/AttributeLink'
          time: '#/components/schemas/AttributeDateTime'
          double: '#/components/schemas/AttributeDouble'
          long: '#/components/schemas/AttributeLong'
          boolean: '#/components/schemas/AttributeBool'
          customentity: '#/components/schemas/AttributeCustomEntity'
          undefined: '#/components/schemas/AttributeObject'
      allOf:
        - $ref: '#/components/schemas/AttributeMetaField'
      properties:
